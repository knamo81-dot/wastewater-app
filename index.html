<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폐수배출시설 운영일지 웹앱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #eef3f8;
      --card: #ffffff;
      --line: #dce5ef;
      --text: #14213d;
      --muted: #6b7a90;
      --navy: #0e1a38;
      --soft: #f7fafc;
      --danger: #ff3b30;
      --danger-soft: #ffe8e5;
      --ok: #0f9d58;
      --ok-soft: #e7f8ef;
      --shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      --radius: 20px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, input, textarea, select { font: inherit; }
    .app-shell {
      max-width: 1540px;
      margin: 0 auto;
      padding: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .title-wrap .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .status-pill.danger { background: var(--danger); color: #fff; }
    .status-pill.ok { background: var(--ok-soft); color: var(--ok); }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 11px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .btn.soft { background: #fff; }
    .btn.danger { background: #fff; color: #b42318; border-color: #f3b4ad; }
    .btn.block { width: 100%; border-radius: 14px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .stat-box {
      padding: 22px;
      min-height: 108px;
    }
    .stat-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
    }
    .tab-btn.active {
      background: #fff;
      color: var(--navy);
      box-shadow: var(--shadow);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .main-grid {
      display: grid;
      grid-template-columns: 500px 1fr;
      gap: 18px;
      align-items: start;
    }
    .form-card, .preview-card, .ledger-card, .admin-card, .log-card {
      padding: 24px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 18px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--navy);
    }
    .input, .textarea, .select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px 15px;
      color: var(--text);
    }
    .textarea { min-height: 94px; resize: vertical; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 15px;
      background: #fff;
      margin-bottom: 14px;
    }
    .checkbox-row input { width: auto; margin: 0; }
    .actions-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .mini-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fff;
      min-height: 92px;
    }
    .mini-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .mini-value {
      font-weight: 800;
      font-size: 18px;
    }
    .hint-box {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fbfdff;
      color: #41526b;
      line-height: 1.8;
    }
    .msg {
      margin-top: 12px;
      white-space: pre-wrap;
      font-size: 14px;
      font-weight: 700;
    }
    .msg.err { color: #b42318; }
    .msg.ok { color: var(--ok); }
    .msg.muted { color: var(--muted); font-weight: 500; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      background: #f5f8fc;
      color: var(--navy);
      font-weight: 800;
      position: sticky;
      top: 0;
    }
    .small-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 7px 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .small-btn.danger { color: #b42318; border-color: #f5c0bb; }
    .small-btn.primary { color: #0e1a38; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 430px;
      padding: 28px;
    }
    .login-card h2 { margin-top: 0; font-size: 28px; }
    .role-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #edf3ff;
      color: #2443a7;
      text-transform: uppercase;
    }
    .role-badge.admin { background: #fff1f0; color: #b42318; }
    .role-badge.operator { background: #eef7ff; color: #175cd3; }
    .role-badge.user { background: #f2f4f7; color: #344054; }
    .toolbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .main-grid { grid-template-columns: 1fr; }
      .preview-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .app-shell { padding: 12px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .title-wrap h1 { font-size: 24px; }
      .stats { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .preview-grid { grid-template-columns: 1fr; }
      .form-card, .preview-card, .ledger-card, .admin-card, .log-card { padding: 18px; }
      .top-actions { justify-content: stretch; }
      .top-actions .btn { width: 100%; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";
window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAILY_TABLE = 'wastewater';
const PICKUP_TABLE = 'wastewater_pickups';
const USERS_TABLE = 'users';
const LOG_TABLE = 'activity_logs';
const CM_LIMIT = 154;
const TON_TO_CM = 22;
const MAX_TON_M3 = 7;

let user = null;
let currentRole = 'user';
let currentTab = 'daily';
let ledgerMonthFilter = '';
let dailyRows = [];
let pickupRows = [];
let userRows = [];
let logRows = [];

function escapeHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function round2(v) { return Math.round((Number(v || 0) + Number.EPSILON) * 100) / 100; }
function cmToM3(cm) { return round2((Number(cm || 0) / CM_LIMIT) * MAX_TON_M3); }
function formatNum(v, digits = 2) {
  if (v === null || v === undefined || v === '' || Number.isNaN(Number(v))) return '-';
  return Number(v).toFixed(digits);
}
function roleBadge(role) {
  return `<span class="role-badge ${role}">${role}</span>`;
}
function getTodayGuidelineText(totalCm) {
  return totalCm > CM_LIMIT ? `OVER ${CM_LIMIT}` : `${formatNum(cmToM3(totalCm), 2)} m³`;
}
function canWrite() { return currentRole === 'admin' || currentRole === 'operator'; }
function canDelete() { return currentRole === 'admin' || currentRole === 'operator'; }
function canAdmin() { return currentRole === 'admin'; }
function monthKeyFromDate(v) { return String(v || '').slice(0, 7); }
function getDefaultLedgerMonth() {
  const sourceDate = dailyRows.length ? dailyRows[0].date : new Date().toISOString().slice(0, 10);
  return monthKeyFromDate(sourceDate);
}
function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function init() {
  const { data } = await sb.auth.getSession();
  if (!data.session) return renderLogin();
  user = data.session.user;
  await ensureUserRow(user.email);
  await loadMyRole();
  await loadAll();
}

function renderLogin(message = '', cls = 'muted') {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="card login-card">
        <h2>로그인</h2>
        <div class="field">
          <label>이메일</label>
          <input id="email" class="input" placeholder="이메일" />
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input id="password" class="input" type="password" placeholder="비밀번호" />
        </div>
        <div class="actions-row">
          <button class="btn primary" onclick="login()">로그인</button>
          <button class="btn soft" onclick="signup()">회원가입</button>
        </div>
        <div class="msg ${cls}">${escapeHtml(message || '로그인 또는 회원가입을 진행하세요.')}</div>
      </div>
    </div>
  `;
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return renderLogin(error.message, 'err');
  await ensureUserRow(email);
  await init();
}

async function signup() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.signUp({ email, password });
  if (error) return renderLogin(error.message, 'err');
  await ensureUserRow(email);
  renderLogin('회원가입 완료. 바로 로그인하세요.', 'ok');
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function ensureUserRow(email) {
  const { data } = await sb.from(USERS_TABLE).select('email').eq('email', email).maybeSingle();
  if (!data) {
    await sb.from(USERS_TABLE).insert([{ email, role: 'user' }]);
  }
}

async function loadMyRole() {
  const { data } = await sb.from(USERS_TABLE).select('role').eq('email', user.email).maybeSingle();
  currentRole = data?.role || 'user';
}

async function logActivity(action, targetType, targetId, details) {
  try {
    await sb.from(LOG_TABLE).insert([{
      actor_email: user?.email || 'unknown',
      action,
      target_type: targetType,
      target_id: String(targetId || ''),
      details: JSON.stringify(details || {})
    }]);
  } catch (e) {
    console.warn('activity_logs insert skipped', e);
  }
}

async function loadAll(message = '', cls = 'muted') {
  const [dailyRes, pickupRes, usersRes, logsRes] = await Promise.all([
    sb.from(DAILY_TABLE).select('*').order('date', { ascending: false }).order('created_at', { ascending: false }),
    sb.from(PICKUP_TABLE).select('*').order('pickup_date', { ascending: false }).order('created_at', { ascending: false }),
    canAdmin() ? sb.from(USERS_TABLE).select('*').order('email', { ascending: true }) : Promise.resolve({ data: [] }),
    canAdmin() ? sb.from(LOG_TABLE).select('*').order('created_at', { ascending: false }).limit(200) : Promise.resolve({ data: [] })
  ]);

  dailyRows = dailyRes.data || [];
  pickupRows = pickupRes.data || [];
  if (!ledgerMonthFilter) ledgerMonthFilter = getDefaultLedgerMonth();
  userRows = usersRes.data || [];
  logRows = logsRes.data || [];
  renderApp(message, cls);
}

function getDerivedStats() {
  const ordered = [...dailyRows].sort((a, b) => new Date(a.date) - new Date(b.date));
  let prevMeter = 0;
  let prevGuideline = 0;
  let totalWaterUse = 0;
  let overCount = 0;
  let latestStatus = '정상';
  let latestStatusClass = 'ok';

  const pickupMap = new Map();
  for (const p of pickupRows) pickupMap.set(p.pickup_date, p);

  const enriched = ordered.map((row, idx) => {
    const meter = Number(row.usage || 0);
    const waterUsed = idx === 0 ? meter : round2(meter - prevMeter);
    totalWaterUse += Math.max(waterUsed, 0);

    const externalCm = row.has_external ? Number(row.external_cm || (Number(row.external_ton || 0) * TON_TO_CM)) : 0;
    const totalCm = round2(Number(row.height || 0) + externalCm);
    const guidelineText = getTodayGuidelineText(totalCm);
    const guidelineValue = totalCm > CM_LIMIT ? null : cmToM3(totalCm);
    const generated = guidelineValue === null ? null : round2(guidelineValue - prevGuideline);
    const pickup = pickupMap.get(row.date);

    if (totalCm > CM_LIMIT) {
      overCount += 1;
      latestStatus = `OVER ${CM_LIMIT}`;
      latestStatusClass = 'danger';
    } else {
      latestStatus = '정상';
      latestStatusClass = 'ok';
    }

    prevMeter = meter;
    prevGuideline = pickup?.after_pickup_cm != null ? cmToM3(Number(pickup.after_pickup_cm)) : (guidelineValue ?? prevGuideline);

    return {
      ...row,
      water_prev: idx === 0 ? 0 : Number(ordered[idx - 1].usage || 0),
      water_used: waterUsed,
      external_cm: externalCm,
      total_cm: totalCm,
      guideline_text: guidelineText,
      generated_text: generated === null ? 'Unverified' : `${formatNum(generated, 2)} m³`,
      pickup
    };
  });

  const totalEntrusted = pickupRows.reduce((sum, p) => sum + Number(p.entrusted_amount || 0), 0);
  return {
    enrichedDaily: enriched,
    totalWaterUse,
    totalEntrusted,
    overCount,
    latestStatus,
    latestStatusClass,
    latest: enriched.length ? enriched[enriched.length - 1] : null
  };
}

function renderApp(message = '', cls = 'muted') {
  const stats = getDerivedStats();
  const latestDaily = stats.latest;
  const filteredLedgerRows = stats.enrichedDaily.filter(row => !ledgerMonthFilter || monthKeyFromDate(row.date) === ledgerMonthFilter);
  const latestMeter = latestDaily ? Number(latestDaily.usage || 0) : 0;

  document.getElementById('app').innerHTML = `
    <div class="app-shell">
      <div class="topbar">
        <div class="title-wrap">
          <h1>폐수배출시설 운영일지 웹앱</h1>
          <div class="sub">모바일 입력, 수거 등록, 자동 계산, 엑셀 내보내기까지 포함한 MVP</div>
          <div class="sub">로그인: ${escapeHtml(user.email)} / 권한: ${roleBadge(currentRole)}</div>
        </div>
        <div class="top-actions">
          <button class="btn soft" onclick="downloadMonthlyExcel()">CSV 다운로드</button>
          <button class="btn soft" onclick="seedSampleData()">샘플로 초기화</button>
          <button class="btn soft" onclick="logout()">로그아웃</button>
        </div>
      </div>

      <div class="stats">
        <div class="card stat-box"><div class="stat-label">누적 당일 용수사용량</div><div class="stat-value">${formatNum(stats.totalWaterUse, 2)} m³</div></div>
        <div class="card stat-box"><div class="stat-label">누적 위탁량</div><div class="stat-value">${formatNum(stats.totalEntrusted, 2)} m³</div></div>
        <div class="card stat-box"><div class="stat-label">초과 발생 일수</div><div class="stat-value">${stats.overCount}일</div></div>
        <div class="card stat-box"><div class="stat-label">최근 상태</div><div class="stat-value">${stats.latestStatusClass === 'danger' ? `<span class="status-pill danger">${stats.latestStatus}</span>` : `<span class="status-pill ok">${stats.latestStatus}</span>`}</div></div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${currentTab === 'daily' ? 'active' : ''}" onclick="switchTab('daily')">일일 입력</button>
        <button class="tab-btn ${currentTab === 'pickup' ? 'active' : ''}" onclick="switchTab('pickup')">수거 등록</button>
        <button class="tab-btn ${currentTab === 'ledger' ? 'active' : ''}" onclick="switchTab('ledger')">운영일지</button>
      </div>

      <div class="tab-panel ${currentTab === 'daily' ? 'active' : ''}">
        <div class="main-grid">
          <div class="card form-card">
            <div class="section-title">📅 모바일 일일 입력</div>
            <div class="field"><label>날짜 (A)</label><input id="daily-date" class="input" type="date" oninput="updateDailyPreview()"></div>
            <div class="field"><label>용수 금일 지침 (G, 계량기 누적값 m³)</label><input id="daily-usage" class="input" type="number" step="0.01" oninput="updateDailyPreview()"></div>
            <div class="field"><label>폐수높이 (Q, cm)</label><input id="daily-height" class="input" type="number" step="0.1" oninput="updateDailyPreview()"></div>
            <div class="field"><label>기타사항 (P)</label><textarea id="daily-note" class="textarea" placeholder="예: 교반기 점검"></textarea></div>
            <div class="checkbox-row">
              <input id="daily-has-external" type="checkbox" onchange="toggleExternalBox(); updateDailyPreview();">
              <label for="daily-has-external">외부보관 있음</label>
            </div>
            <div id="external-box" style="display:none;">
              <div class="field"><label>외부보관량 (T)</label><input id="daily-external-ton" class="input" type="number" step="0.1" value="1" oninput="updateDailyPreview()"></div>
              <div class="field"><label>환산높이 (cm)</label><input id="daily-external-cm" class="input" type="number" step="0.1" value="22" oninput="updateDailyPreview()"></div>
            </div>
            ${canWrite() ? `<button class="btn primary block" onclick="saveDailyRow()">💾 저장 / 수정</button>` : `<div class="msg muted">일반 사용자는 조회만 가능합니다.</div>`}
            <div id="daily-msg" class="msg muted"></div>
          </div>

          <div class="card preview-card">
            <div class="section-title">🔥 자동 계산 미리보기</div>
            <div class="preview-grid">
              <div class="mini-card"><div class="mini-label">용수 전일 지침</div><div id="pv-water-prev" class="mini-value">${formatNum(latestMeter, 2)} m³</div></div>
              <div class="mini-card"><div class="mini-label">용수 금일 지침</div><div id="pv-water-today" class="mini-value">-</div></div>
              <div class="mini-card"><div class="mini-label">당일 용수사용량</div><div id="pv-water-used" class="mini-value">-</div></div>
              <div class="mini-card"><div class="mini-label">외부보관 높이</div><div id="pv-external-cm" class="mini-value">0.0 cm</div></div>
              <div class="mini-card"><div class="mini-label">계산용 총높이</div><div id="pv-total-cm" class="mini-value">-</div></div>
              <div class="mini-card"><div class="mini-label">금일지침 / 총 발생량</div><div id="pv-guideline" class="mini-value">-</div></div>
            </div>
            <div class="hint-box">
              용수 G열은 <b>당일 사용량</b>이 아니라 <b>계량기 누적값</b>을 입력합니다.<br>

function renderLedgerRows(rows) {
  const sorted = [...rows].sort((a, b) => {
    const byDate = String(b.date || '').localeCompare(String(a.date || ''));
    if (byDate !== 0) return byDate;
    return String(b.created_at || '').localeCompare(String(a.created_at || ''));
  });

  if (!sorted.length) return `<tr><td colspan="12">운영일지 데이터가 없습니다.</td></tr>`;

  return sorted.map(row => `
    <tr>
      <td>${escapeHtml(row.date)}</td>
      <td>${formatNum(row.water_prev, 2)}</td>
      <td>${formatNum(row.usage, 2)}</td>
      <td>${formatNum(row.water_used, 2)}</td>
      <td>${formatNum(row.height, 1)} cm</td>
      <td>${row.has_external ? `${formatNum(row.external_ton || 0, 1)}T / ${formatNum(row.external_cm, 1)}cm` : '-'}</td>
      <td>${formatNum(row.total_cm, 1)} cm</td>
      <td>${escapeHtml(row.guideline_text)}</td>
      <td>${escapeHtml(row.generated_text)}</td>
      <td>${row.pickup ? `위탁 ${formatNum(row.pickup.entrusted_amount, 2)}m³<br>후높이 ${formatNum(row.pickup.after_pickup_cm, 1)}cm` : '-'}</td>
      <td>${escapeHtml(row.note || '')}</td>
      <td>${canDelete() ? `<button class="small-btn danger" onclick="deleteDailyRow(${row.id})">삭제</button>` : '-'}</td>
    </tr>
  `).join('');
}

function switchTab(tab) {
  currentTab = tab;
  renderApp();
}

function changeLedgerMonth(value) {
  ledgerMonthFilter = value;
  renderApp();
}

function toggleExternalBox() {
  const checked = document.getElementById('daily-has-external')?.checked;
  const box = document.getElementById('external-box');
  if (box) box.style.display = checked ? 'block' : 'none';
}

function updateDailyPreview() {
  const hasExternal = !!document.getElementById('daily-has-external')?.checked;
  toggleExternalBox();
  const latestMeter = (() => {
    const stats = getDerivedStats();
    return stats.latest ? Number(stats.latest.usage || 0) : 0;
  })();
  const meter = Number(document.getElementById('daily-usage')?.value || 0);
  const height = Number(document.getElementById('daily-height')?.value || 0);
  const extTon = Number(document.getElementById('daily-external-ton')?.value || 0);
  const extCm = hasExternal ? Number(document.getElementById('daily-external-cm')?.value || (extTon * TON_TO_CM)) : 0;
  const totalCm = round2(height + extCm);
  const waterUsed = meter ? round2(meter - latestMeter) : null;
  const guideline = meter || height ? getTodayGuidelineText(totalCm) : '-';
  const latest = getDerivedStats().latest;
  const prevGuideline = latest?.pickup?.after_pickup_cm != null ? cmToM3(Number(latest.pickup.after_pickup_cm)) : (latest ? (latest.total_cm > CM_LIMIT ? 0 : cmToM3(latest.total_cm)) : 0);
  const generated = (meter || height) ? (totalCm > CM_LIMIT ? 'Unverified' : `${formatNum(round2(cmToM3(totalCm) - prevGuideline), 2)} m³`) : '-';

  setText('pv-water-prev', `${formatNum(latestMeter, 2)} m³`);
  setText('pv-water-today', meter ? `${formatNum(meter, 2)} m³` : '-');
  setText('pv-water-used', waterUsed === null ? '-' : `${formatNum(waterUsed, 2)} m³`);
  setText('pv-external-cm', `${formatNum(extCm, 1)} cm`);
  setText('pv-total-cm', totalCm ? `${formatNum(totalCm, 1)} cm` : '-');
  setText('pv-guideline', `${guideline} / ${generated}`);
}

function setText(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}
function showMessage(id, message, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `msg ${cls}`;
  el.textContent = message || '';
}

async function saveDailyRow() {
  if (!canWrite()) return renderApp('저장 권한이 없습니다.', 'err');
  const date = document.getElementById('daily-date').value;
  const usage = document.getElementById('daily-usage').value;
  const height = document.getElementById('daily-height').value;
  const note = document.getElementById('daily-note').value;
  const hasExternal = document.getElementById('daily-has-external').checked;
  const externalTon = document.getElementById('daily-external-ton').value || 0;
  const externalCm = document.getElementById('daily-external-cm').value || 0;

  if (!date || usage === '' || height === '') return renderApp('날짜, 용수, 높이는 필수입니다.', 'err');

  const { data, error } = await sb.from(DAILY_TABLE).insert([{
    date,
    usage: parseFloat(usage),
    height: parseFloat(height),
    note,
    has_external: hasExternal,
    external_ton: parseFloat(externalTon || 0),
    external_cm: parseFloat(externalCm || 0)
  }]).select().single();

  if (error) return renderApp('일일 입력 저장 실패: ' + error.message, 'err');
  await logActivity('save', 'daily', data?.id, { date, usage, height });
  clearDailyForm();
  await loadAll('일일 입력 저장 완료', 'ok');
}

function clearDailyForm() {
  ['daily-date','daily-usage','daily-height','daily-note','daily-external-ton','daily-external-cm'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id === 'daily-external-ton') el.value = '1';
    else if (id === 'daily-external-cm') el.value = '22';
    else el.value = '';
  });
  const chk = document.getElementById('daily-has-external');
  if (chk) chk.checked = false;
  toggleExternalBox();
  updateDailyPreview();
}

async function savePickupRow() {
  if (!canWrite()) return renderApp('저장 권한이 없습니다.', 'err');
  const pickupDate = document.getElementById('pickup-date').value;
  const entrustedAmount = document.getElementById('pickup-amount').value;
  const certificateNo = document.getElementById('pickup-cert').value;
  const contractor = document.getElementById('pickup-contractor').value;
  const afterPickupCm = document.getElementById('pickup-after-cm').value;
  const note = document.getElementById('pickup-note').value;

  if (!pickupDate || entrustedAmount === '') return renderApp('수거일과 위탁량은 필수입니다.', 'err');

  const { data, error } = await sb.from(PICKUP_TABLE).insert([{
    pickup_date: pickupDate,
    entrusted_amount: parseFloat(entrustedAmount),
    certificate_no: certificateNo,
    contractor,
    after_pickup_cm: afterPickupCm === '' ? null : parseFloat(afterPickupCm),
    note
  }]).select().single();

  if (error) return renderApp('수거 등록 저장 실패: ' + error.message, 'err');
  await logActivity('save', 'pickup', data?.id, { pickupDate, entrustedAmount, contractor });
  clearPickupForm();
  await loadAll('수거 등록 저장 완료', 'ok');
}

function clearPickupForm() {
  ['pickup-date','pickup-amount','pickup-cert','pickup-contractor','pickup-after-cm','pickup-note'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

async function deleteDailyRow(id) {
  if (!canDelete()) return renderApp('삭제 권한이 없습니다.', 'err');
  if (!confirm('일일 입력 데이터를 삭제하시겠습니까?')) return;
  const { error } = await sb.from(DAILY_TABLE).delete().eq('id', id);
  if (error) return renderApp('일일 입력 삭제 실패: ' + error.message, 'err');
  await logActivity('delete', 'daily', id, {});
  await loadAll('일일 입력 삭제 완료', 'ok');
}

async function deletePickupRow(id) {
  if (!canDelete()) return renderApp('삭제 권한이 없습니다.', 'err');
  if (!confirm('수거 등록 데이터를 삭제하시겠습니까?')) return;
  const { error } = await sb.from(PICKUP_TABLE).delete().eq('id', id);
  if (error) return renderApp('수거 등록 삭제 실패: ' + error.message, 'err');
  await logActivity('delete', 'pickup', id, {});
  await loadAll('수거 등록 삭제 완료', 'ok');
}

async function changeRole(email) {
  if (!canAdmin()) return renderApp('관리자만 권한 변경 가능합니다.', 'err');
  const newRole = document.getElementById(`role-${escapeId(email)}`).value;
  const { error } = await sb.from(USERS_TABLE).update({ role: newRole }).eq('email', email);
  if (error) return renderApp('권한 변경 실패: ' + error.message, 'err');
  await logActivity('role_change', 'user', email, { newRole });
  await loadAll('권한 변경 완료', 'ok');
}

async function transferAdmin(targetEmail) {
  if (!canAdmin()) return renderApp('관리자만 양도 가능합니다.', 'err');
  if (!confirm(`${targetEmail} 에게 관리자 권한을 양도하시겠습니까?`)) return;
  const demote = await sb.from(USERS_TABLE).update({ role: 'operator' }).eq('email', user.email);
  if (demote.error) return renderApp('현재 관리자 권한 변경 실패: ' + demote.error.message, 'err');
  const promote = await sb.from(USERS_TABLE).update({ role: 'admin' }).eq('email', targetEmail);
  if (promote.error) return renderApp('관리자 양도 실패: ' + promote.error.message, 'err');
  await logActivity('transfer_admin', 'user', targetEmail, { from: user.email, to: targetEmail });
  await loadMyRole();
  await loadAll('관리자 양도 완료', 'ok');
}

function escapeId(email) {
  return email.replace(/[^a-zA-Z0-9]/g, '_');
}

function seedSampleData() {
  renderApp('샘플 초기화 버튼은 현재 안내용입니다. 실제 데이터는 Supabase에서 직접 관리하거나 별도 샘플 스크립트를 연결해 주세요.', 'muted');
}

function downloadMonthlyExcel() {
  const month = document.getElementById('ledger-month')?.value || ledgerMonthFilter || monthKeyFromDate(new Date().toISOString().slice(0, 10));
  const stats = getDerivedStats();
  const ledgerRows = [...stats.enrichedDaily].filter(r => monthKeyFromDate(r.date) === month)
    .sort((a, b) => String(b.date).localeCompare(String(a.date)) || String(b.created_at || '').localeCompare(String(a.created_at || '')));
  const pickupFiltered = pickupRows.filter(r => monthKeyFromDate(r.pickup_date) === month)
    .sort((a, b) => String(b.pickup_date).localeCompare(String(a.pickup_date)) || String(b.created_at || '').localeCompare(String(a.created_at || '')));
  const logsFiltered = logRows.filter(r => monthKeyFromDate(r.created_at) === month);

  const sheet1 = [
    ['날짜','용수전일','용수금일','당일사용량','저장고높이','외부보관','계산용총높이','금일지침','총발생량','수거정보','기타'],
    ...ledgerRows.map(r => [
      r.date,
      formatNum(r.water_prev,2),
      formatNum(r.usage,2),
      formatNum(r.water_used,2),
      formatNum(r.height,1),
      r.has_external ? `${formatNum(r.external_ton || 0,1)}T / ${formatNum(r.external_cm,1)}cm` : '-',
      formatNum(r.total_cm,1),
      r.guideline_text,
      r.generated_text,
      r.pickup ? `위탁 ${formatNum(r.pickup.entrusted_amount,2)} / 후높이 ${formatNum(r.pickup.after_pickup_cm,1)}` : '-',
      r.note || ''
    ])
  ];

  const sheet2 = [
    ['수거일','위탁량','확인서번호','처리업소','수거후높이','비고'],
    ...pickupFiltered.map(r => [r.pickup_date, formatNum(r.entrusted_amount,2), r.certificate_no || '', r.contractor || '', formatNum(r.after_pickup_cm,1), r.note || ''])
  ];

  const sheet3 = [
    ['시간','사용자','동작','대상','상세'],
    ...logsFiltered.map(r => [r.created_at || '', r.actor_email || '', r.action || '', `${r.target_type || ''}/${r.target_id || ''}`, r.details || ''])
  ];

  const workbookHtml = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:x="urn:schemas-microsoft-com:office:excel"
          xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="UTF-8">
        <!--[if gte mso 9]><xml>
          <x:ExcelWorkbook>
            <x:ExcelWorksheets>
              <x:ExcelWorksheet><x:Name>운영일지</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
              <x:ExcelWorksheet><x:Name>수거등록</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
              <x:ExcelWorksheet><x:Name>로그</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
            </x:ExcelWorksheets>
          </x:ExcelWorkbook>
        </xml><![endif]-->
      </head>
      <body>
        ${tableToHtml('운영일지', sheet1)}
        <br/><br/>
        ${tableToHtml('수거등록', sheet2)}
        <br/><br/>
        ${tableToHtml('로그', sheet3)}
      </body>
    </html>
  `;

  downloadFile(`폐수운영일지_${month}.xls`, workbookHtml, 'application/vnd.ms-excel;charset=utf-8;');
}

function tableToHtml(title, rows) {
  return `
    <table border="1">
      <tr><th colspan="${rows[0]?.length || 1}" style="background:#dbe5f1;">${escapeHtml(title)}</th></tr>
      ${rows.map((row, idx) => `
        <tr>
          ${row.map(cell => idx === 0
            ? `<th>${escapeHtml(cell)}</th>`
            : `<td>${escapeHtml(cell)}</td>`).join('')}
        </tr>
      `).join('')}
    </table>
  `;
}
