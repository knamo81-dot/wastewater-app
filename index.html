<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폐수 관리 앱</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; padding:20px; background:#f5f7fa; }
.card { background:#fff; padding:20px; border-radius:10px; }
input, textarea { width:100%; margin-bottom:10px; padding:8px; }
button { padding:8px 12px; margin-right:5px; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:8px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let dataList = [];

async function init() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    user = data.session.user;
    loadData();
  } else {
    renderLogin();
  }
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>로그인</h2>
      <input id="email" placeholder="이메일">
      <input id="password" type="password" placeholder="비밀번호">
      <button onclick="login()">로그인</button>
      <button onclick="signup()">회원가입</button>
    </div>
  `;
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return alert(error.message);

  init();
}

async function signup() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await sb.auth.signUp({ email, password });
  if (error) return alert(error.message);

  alert("회원가입 완료");
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadData() {
  const { data } = await sb.from('wastewater').select('*').order('date', { ascending:false });
  dataList = data || [];
  renderApp();
}

function renderApp() {
  const rows = dataList.map(d => `
    <tr>
      <td>${d.date}</td>
      <td>${d.usage}</td>
      <td>${d.height}</td>
      <td>${d.note || ''}</td>
      <td>${d.created_at}</td>
      <td><button onclick="deleteRow(${d.id})">삭제</button></td>
    </tr>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>폐수 관리</h2>
      <button onclick="logout()">로그아웃</button>

      <input id="date" type="date">
      <input id="usage" placeholder="용수">
      <input id="height" placeholder="폐수 높이">
      <textarea id="note" placeholder="기타"></textarea>

      <button onclick="saveData()">저장</button>

      <table>
        <tr>
          <th>날짜</th><th>용수</th><th>높이</th><th>기타</th><th>시간</th><th>삭제</th>
        </tr>
        ${rows}
      </table>
    </div>
  `;
}

async function saveData() {
  const date = document.getElementById('date').value;
  const usage = document.getElementById('usage').value;
  const height = document.getElementById('height').value;
  const note = document.getElementById('note').value;

  await sb.from('wastewater').insert([{ date, usage, height, note }]);

  loadData();
}

async function deleteRow(id) {
  if (!confirm('삭제하시겠습니까?')) return;

  await sb.from('wastewater').delete().eq('id', id);

  loadData();
}

init();
</script>

</body>
</html>
