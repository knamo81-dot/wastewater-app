<!DOCTYPE html>

<head>

<style>
:root {
  --bg:#eef3f8; --card:#fff; --line:#dce5ef; --text:#14213d; --muted:#6b7a90; --navy:#0e1a38;
  --soft:#f7fafc; --danger:#ff3b30; --ok:#0f9d58; --ok-soft:#e7f8ef; --warn:#f79009; --warn-soft:#fff3e6;
  --shadow:0 8px 18px rgba(15,23,42,.08); --radius:20px; --sky-soft:#eaf4ff; --sky-text:#175cd3;
  --amber-soft:#fff4e5; --amber-text:#b54708; --indigo-soft:#eef2ff; --indigo-text:#3538cd;

}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea,select{font:inherit} .app-shell{max-width:1560px;margin:0 auto;padding:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}
.title-wrap h1{margin:0;font-size:32px;font-weight:800;letter-spacing:-.02em}
.title-wrap .sub{margin-top:8px;color:var(--muted);font-size:15px}
.top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:11px 18px;cursor:pointer;font-weight:700}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)} .btn.danger{color:#b42318;border-color:#f3b4ad}
.btn.block{width:100%;border-radius:14px} .btn.warn{border-color:#f7d3a1;color:#b54708}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat-box{padding:22px;min-height:108px} .stat-label{color:var(--muted);font-size:14px;margin-bottom:10px;font-weight:700}
.stat-value{font-size:24px;font-weight:800;line-height:1}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.tab-btn{border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:14px 10px;text-align:center;font-weight:800;color:var(--muted);cursor:pointer}
.tab-btn.active{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
.tab-panel{display:none} .tab-panel.active{display:block}
.main-grid{display:grid;grid-template-columns:500px 1fr;gap:18px;align-items:start}
.form-card,.preview-card,.ledger-card,.admin-card,.log-card,.ref-card{padding:24px}
.section-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;margin-bottom:18px}
.field{margin-bottom:16px} .field label{display:block;margin-bottom:8px;font-weight:700;color:var(--navy)}
.input,.textarea,.select{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px 15px;color:var(--text)}
.textarea{min-height:94px;resize:vertical}
.checkbox-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;padding:14px 15px;background:#fff;margin-bottom:14px}
.checkbox-row input{width:auto;margin:0}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.mini-card{border:1px solid var(--line);border-radius:18px;padding:18px;background:#fff;min-height:92px}
.mini-label{color:var(--muted);font-size:14px;font-weight:700;margin-bottom:10px} .mini-value{font-weight:800;font-size:18px}
.hint-box{border:1px dashed var(--line);border-radius:18px;padding:18px;background:#fbfdff;color:#41526b;line-height:1.8}
.form-chip-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-chip{border:1px solid var(--line);background:#fff;border-radius:14px;padding:13px 12px;text-align:center;font-weight:800;cursor:pointer;color:var(--muted)}
.type-chip.active.wastewater{background:var(--indigo-soft);color:var(--indigo-text);border-color:#c7d2fe}
.type-chip.active.waste{background:var(--green-soft);color:var(--green-text);border-color:#b7ebc6}
.type-box{border-radius:18px;padding:16px;margin-bottom:16px} .type-box.wastewater{border:1px solid #dbeafe;background:#f5faff} .type-box.waste{border:1px solid #d1fadf;background:#f3fff7}
.type-box-title{font-size:14px;font-weight:800;margin-bottom:14px}
.inline-badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
.inline-badge.wastewater{background:var(--sky-soft);color:var(--sky-text)} .inline-badge.waste{background:var(--amber-soft);color:var(--amber-text)}
.inline-badge.locked{background:#fee4e2;color:#b42318} .inline-badge.partial{background:#fff4e5;color:#b54708} .inline-badge.ok{background:#e7f8ef;color:#0f9d58}
.msg{margin-top:12px;white-space:pre-wrap;font-size:14px;font-weight:700} .msg.err{color:#b42318} .msg.ok{color:var(--ok)} .msg.muted{color:var(--muted);font-weight:500}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}
table{width:100%;border-collapse:collapse;min-width:1100px;background:#fff} th,td{border-bottom:1px solid var(--line);padding:12px;text-align:left;vertical-align:top;font-size:14px} th{background:#f5f8fc;color:var(--navy);font-weight:800;position:sticky;top:0}
.small-btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 10px;cursor:pointer;font-weight:700} .small-btn.danger{color:#b42318;border-color:#f5c0bb}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px} .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px} .login-card{width:100%;max-width:430px;padding:28px} .login-card h2{margin-top:0;font-size:28px}
.role-badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;background:#edf3ff;color:#2443a7;text-transform:uppercase}
.role-badge.admin{background:#fff1f0;color:#b42318} .role-badge.operator{background:#eef7ff;color:#175cd3} .role-badge.user{background:#f2f4f7;color:#344054} .role-badge.supervisor{background:#f3e8ff;color:#6b21a8}
.toolbar-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px} .toolbar-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.approval-box{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}
.signature-preview{display:block;max-width:140px;max-height:60px;border:1px solid var(--line);border-radius:8px;background:#fff;object-fit:contain;padding:4px}
.ref-layout{display:grid;grid-template-columns:280px 1fr;gap:18px} .ref-menu{display:flex;flex-direction:column;gap:10px} .ref-btn{padding:14px;border:1px solid var(--line);background:#fff;border-radius:14px;text-align:left;font-weight:800;cursor:pointer} .ref-btn.active{background:#0e1a38;color:#fff;border-color:#0e1a38}
.ref-content{display:flex;flex-direction:column;gap:14px} .ref-paragraph{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;line-height:1.7;white-space:pre-wrap}
.doc-meta{font-size:12px;color:var(--muted)} .search-input{max-width:320px}

.doc-container{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;line-height:1.9;box-shadow:var(--shadow)}
.doc-editor{padding:22px;border-radius:18px}
.ref-editor-textarea{min-height:360px;font-family:Arial,sans-serif;line-height:1.7}
.doc-title{font-size:24px;font-weight:900;margin-bottom:6px;color:var(--navy);letter-spacing:-.02em}
.doc-meta-top{font-size:13px;color:#667085}
.doc-meta{font-size:13px;color:#667085;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #e4e7ec}
.doc-body{font-size:15px}
.doc-section{font-weight:800;margin-top:24px;margin-bottom:10px;color:#0f172a}
.doc-question{font-weight:900;margin-top:20px;margin-bottom:10px;color:#0f172a}
.doc-answer{margin-left:14px;margin-bottom:8px;color:#344054;line-height:1.85}
.doc-text{margin-bottom:8px}
.doc-spacer{height:10px}
.doc-empty{color:#667085;padding:8px 0}


.ledger-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ledger-approval-box{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:flex-end}
.btn.approval-on{background:var(--navy);color:#fff;border-color:var(--navy)}

.tabs-wrap{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.tabs-main{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1}
.admin-mini-btn{padding:10px 14px;font-size:13px;border-radius:14px;white-space:nowrap}
.admin-mini-btn.active{background:#fff;color:var(--navy);box-shadow:var(--shadow);font-weight:800}
.admin-panel-grid{display:grid;grid-template-columns:1fr;gap:18px}
.sign-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
.sign-box{border:1px solid #d0d5dd;border-radius:12px;padding:14px;min-height:120px;text-align:center;background:#fff;display:flex;flex-direction:column;justify-content:space-between}
.sign-title{font-weight:800;font-size:13px;color:#101828;margin-bottom:8px}
.sign-image-wrap{height:80px;display:flex;align-items:center;justify-content:center}
.sign-image{max-width:180px;max-height:76px;object-fit:contain}
.sign-date{font-size:12px;color:#667085;margin-top:8px}
.mail-help{font-size:12px;color:#667085}



@media (max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)} .main-grid,.ref-layout{grid-template-columns:1fr} .preview-grid{grid-template-columns:repeat(2,1fr)} .two-col,.three-col{grid-template-columns:1fr}}
@media (max-width:720px){.app-shell{padding:12px} .topbar{flex-direction:column} .title-wrap h1{font-size:24px} .stats,.tabs,.preview-grid{grid-template-columns:1fr} .form-card,.preview-card,.ledger-card,.admin-card,.log-card,.ref-card{padding:18px} table{min-width:860px} .form-chip-row{grid-template-columns:1fr}}
</style>

<script>
const SUPABASE_URL="https://wjxyspuieuzfhfosmpin.supabase.co";
const SUPABASE_KEY="sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";
window.sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const DAILY_TABLE='wastewater';
const PICKUP_TABLE='wastewater_pickups';
const USERS_TABLE='users';
const LOG_TABLE='activity_logs';
const APPROVAL_TABLE='monthly_approvals';
const APPROVAL_LOG_TABLE='approval_logs';
const REFERENCE_TABLE='reference_docs';
const CM_LIMIT=154;
const TON_TO_CM=22;

const DEFAULT_REFERENCE_DOCS={"facilities": {"title": "시설운영정보", "source": "1. 폐기물-폐수배출시설 운영일지(기본설명)(upd.26.02).xlsx", "lines": ["폐수배출시설 운영일지", "UPDATE: 2026-02-04", "① 용수 → 폐수 / 말통 흐름 요약 (내부용 도식 설명문 )", "[용수 사용 → 배출 경로 구분 설명]", "연구소에서 사용된 용수는 성상에 따라 두 가지 경로로 구분하여 관리된다.", "① 일반 세척수 및 비위험성 액상 폐수는 실험실 배관을 통해 폐수저장고로 유입되며, 폐수배출시설 운영일지 기준으로 계량·관리된다.", "폐수저장고의 총 저장 용량은 7톤이며, 계기판의 전체 높이는 154cm이다.", "", "계기판은 기본적으로 1톤 단위로 눈금 표시가 되어 있으나, 일일 점검 시 보다 정확한 현재 저장량 확인을 위해 실측 높이 기반 환산 방식을 병행하여 사용한다.", "즉, 계기판에서 확인한 현재 폐수 수위(cm)에 총 용량 7톤을 곱한 후, 계기판 총 높이 154cm로 나누는 방식을 통해 현재 저장된 폐수량(톤)을 산출할 수 있다.", "(현재 폐수량 = 측정 높이 × 7톤 ÷ 154cm)", "② 산·유기계 등 반응성 또는 위험성이 있는 액상 폐수는 폐수저장고로 유입하지 않고, 실험실 내 20L 말통에 별도로 수거하여 지정폐기물로 분류한다.", "해당 폐수는 폐기물 위탁처리 업체를 통해 외부 반출·처리되며, 모든 반출 이력은 폐기물 인계서를 통해 관리된다.", "③ 이로 인해 용수 사용량은 실험실 전체 사용량을 반영하는 반면, 폐수 발생량은 폐수저장고 유입 기준으로 계량되므로 두 수치는 구조적으로 1:1로 일치하지 않는다.", "※ 연구소에서는 폐수를 ‘폐수저장고 유입 폐수’와 ‘말통 수거 지정폐기물’로 구분 관리하고 있어, 용수사용량 대비 폐수저장고 기준 폐수량이 적게 나타나는 것은 정상이며 각 항목은 운영일지와 폐기물 인계서로", "분리 관리하고 있다. 각 항목은 운영일지와 폐기물 인계서로 분리 관리하고 있다.", "용수사용량 (세척실위치) 폐수사용량 (말통보관-폐기물처리)", "구분 : 용수계량기\n위치 : 세척실\n확인 : 매일 구분 : 산/유기용제\n위치 : 실험실 배치 및 폐기물실 보관\n확인 : 실험실 매일 확인 및 폐기물실의 경우 수거시 배출량 확인", "폐수사용량 (저장고보관-폐수처리)", "구분 : 폐수저장고(3.5T 2개)\n위치 : 폐수실\n확인 : 매일", "② 왜 연구소는 폐수가 적게 발생하는가", "1. 적용 범위", "제약회사 연구소", "연구용 소규모 제형 개발 및 평가 공정", "2. 용수 사용 대비 폐수 회수율 개념", "용수사용량: 실험, 세척, 인원 사용, 공정 보조수 포함", "폐수발생량: 폐수저장고로 유입되어 액상 상태로 회수·계량된 수량", "👉 산·유기계 일부 폐수는 실험실 내 20L 말통에 수거 후 외부 위탁 처리", "👉 두 수치는 구조적으로 동일할 수 없음", "3. 폐수 회수율이 낮아지는 주요 원인", "① 공정 특성", "가열·교반 공정 → 수분 증발", "소량 다회 실험 → 세척수 분산", "② 제형 특성", "겔·현탁·유화 제형 → 고형/반고형 폐기", "여과·흡착 공정 → 액상 회수 불가", "③ 세척 및 건조", "IPA/EtOH 세척 후 공기 건조", "와이퍼·거즈·여과지 흡착", "④ 폐수 관리 방식", "산·유기계 폐수 → 실험실 내 말통 수거", "폐수저장고 미유입 → 위탁 폐기물로 처리", "4. 일반적인 연구소 폐수 회수율 (참고 범위)", "항목 비율", "용수 대비 폐수 (저장고 기준) :    약 40~70%", "증발·흡착·고형·별도 위탁 처리 :    약 30~60%", "※ 연구실 운영 형태에 따라 변동 가능", "③ 왜 연구소는 폐업업체 폐수 수거량 대비 사업장 폐수 감소량이 적은가", "1. 계측 기준 차이", "사업장: 폐수저장고 수위 기준 부피 환산", "폐수업체: 수거 폐수 차량 계근(무게)", "2. 폐수 성상 차이", "용존, 부유 고형물 포함 -> 물 대비 비중 증가", "부피 기준 환산량 < 계근 기준 수거량", "3. 회수 방식 차이", "폐수는 저장고 하부 흡입  방식으로 회수", "하부 슬러지 포함 수거", "④ 관리 원칙", "실제 계량값 기준 기록", "산·유기계 폐수는 위탁 처리 내역으로 관리", "수치 보정 금지", "운영일지 비고란에 사유 명시", "월별 추세 관리 중심", "⑤ 최종정리", "※ 연구소에서는 공정 특성에 따른 증발·흡착 손실과 더불어 산·유기계 일부 폐수를 말통 수거 후 위탁 처리하고 있어, 용수사용량 대비 폐수저장고 기준 폐수 발생량이 약 2배 차이 나는 것은 자연스러운 현상이며", "실제 계량값을 기준으로 일관되게 기록·설명하는 것이 가장 안전한 관리 방법이다."]}, "qa": {"title": "환경점검 대응 Q&A", "source": "2. 폐기물-폐수배출시설 환경점검 대응(upd.26.02)Q&A.xlsx", "lines": ["폐기물-폐수배출시설 환경점검 대응 Q&A (실무용)", "UPDATE: 2026-02-04", "Q1. 왜 용수사용량 대비 폐수 발생량이 적습니까?", "A. 연구소는 가열·교반 공정, 반고형 제형 취급, 용기 세척 및 공기 건조 과정이 많아 증발 손실과 고형물 흡착 손실이 발생합니다.", "또한 산·유기계 등 일부 폐수는 배관을 통한 폐수저장고로 이동하지 않고 실험실에서 20L 말통에 별도 수거 후 폐기물 업체를 통해 위탁 처리하고 있어, 폐수저장고 기준의 계량량은 용수사용량 대비 낮게 나타납니다.", "Q2. 왜 폐수업체 폐수 수거량 대비 사업장 폐수 감소량이 적습니까?", "A. 사업장에서는 폐수 저장조 수위를 기준으로 부피 환산 방식으로 폐수량을 관리하고 있으며, 폐수 수거업체는 실제 수고 폐수를 차량 계근을 통해 무게 기준으로 산정하고 있습니다.", "이로 인해 폐수의 비중, 슬러지 포함 여부, 계측 기준 차이 등에 따라 내부 관리상 폐수 감소량과 수거업체 수거량 간 수치 차이가 발생할 수 있습니다.", "Q3. 왜 폐수로 안 보내고 말통에 받습니까?", "A. 산·유기계 폐수는 배관 유입 시 부식, 반응성, 혼합 위험이 있어 관련 기준에 따라 실험실 내에서 별도 용기에 수거하고 지정폐기물로 위탁 처리하고 있습니다.", "Q4. 그럼 폐수량이 실제보다 적게 기록되는 것 아닙니까?", "A. 폐수배출시설 운영일지는 폐수저장고로 유입된 액상 폐수 기준으로 작성하고 있으며, 말통 수거 폐수는 폐기물 인계서로 별도 관리하고 있어 이중 누락은 없습니다.", "Q5. 말통 폐수 양은 어떻게 확인합니까?", "A. 말통 폐수는 발생 시 수거 기록 및 폐기물 인계서를 통해 반출 이력이 관리되고 있으며, 운영일지에는 폐수저장고 유입량만 기재하고 있습니다.", "Q6. 두 자료가 서로 안 맞아도 괜찮습니까?", "A. 관리 대상과 계량 기준이 다르기 때문에 수치 일치는 필요하지 않으며, 각각의 관리 문서가 역할에 맞게 유지되고 있습니다.", "Q7. 싱크에 버린 물은 전부 폐수통으로 가지 않습니까?", "A. 일반 세척수 등은 배관을 통해 폐수저장고로 이동하나, 산·유기계 폐수 등은 관련 규정에 따라 실험실 내에서 별도 용기에 수거하여 위탁 처리하고 있습니다.", "또한 배관 체류 중 증발, 트랩 잔류, 여과지·와이퍼 흡착 등으로 폐수통에 계량되지 않는 수량이 일부 발생합니다.", "Q8. 용수 대비 폐수 비율이 약 50% 수준인데 문제 없습니까?", "A. 연구소의 경우 일반적으로 용수 대비 폐수 회수율은 약 40~70% 범위로 관리됩니다.", "여기에 더해 일부 산·유기계 폐수는 말통 수거 후 외부 위탁 처리되므로, 폐수저장고 기준 폐수량만을 비교할 경우 해당 비율은 충분히 합리적인 범위입니다.", "Q9. 수치를 보정해서 맞춰야 하지 않습니까?", "A. 아닙니다. 운영일지는 실제 계량값 기준으로 작성하는 것이 원칙이며, 산·유기계 폐수의 별도 위탁 처리 역시 실제 관리 방식에 따라 기록하고 있습니다. 임의 보정은 허위 기재로 오해될 수 있어 지양하고 있습니다.", "Q10. 폐수 발생량이 월별로 완전히 일정하지 않은 이유는?", "A. 월별 실험 종류, 제형 유형, 가열 공정 유무뿐 아니라 산·유기계 폐수 발생 빈도 및 위탁 처리량 차이에 따라 폐수저장고로 유입되는 수량이 달라질 수 있습니다."]}, "waterMismatch": {"title": "용수/폐수량 비일치의 건", "source": "3. EPA Guide 및 환경부(산업계) 인용 정리.xlsx", "lines": ["① EPA Guide 인용 논리적 근거 문단", "UPDATE: 2026-01-28", "(실험실 용수사용량 ≠ 폐수발생량 설명용)", "실험실 환경에서는 용수 사용량 전체가 폐수로 회수되지 않는 것이 구조적인 특성이다.\n미국 환경보호청(EPA)이 발간한 Water Efficiency in Laboratories 가이드에서는 연구시설의 물 사용을 평가할 때 facility water balance(물 수지) 개념을 적용하도록 권고하고 있으\n며, 구매된 용수량과 실제 사용·배출량이 반드시 일치하지 않을 수 있음을 전제로 하고 있다.\n해당 가이드는 실험실 내 물이 실험 공정, 장비 세척, 냉각, 증발 및 공정 잔류 등 다양한 경로로 사용·소모되기 때문에, 입력된 용수 전량이 폐수로 배출되지 않는 상황이 일반적임을 설명한다.\n따라서 실험실, 특히 가열·교반·세척 공정이 빈번한 제약회사 제제연구실에서는 용수사용량 대비 실제 액상 폐수 발생량이 낮게 나타나는 현상이 구조적으로 발생할 수 있다.", "② 환경부(산업계) 산업폐수 통계 활용 예시 문단", "(산업계 비교·보조 근거용)", "산업계 전반의 통계 자료에서도 용수 사용량과 폐수 발생량이 1:1로 일치하지 않는 사례가 확인된다.\n환경부 산하 한국환경정책·평가연구원(KEI) 및 관련 기관의 산업 자원효율성 분석 자료에 따르면, 업종별 공업용수 사용량 대비 폐수 방류량(폐수배출율)은 산업 특성에 따라 상이하게 나타나며, 특히 화학물질 및 화학제품 제조업에서는 공업용수 사용량 대비 폐수배출율이 상대적으로 낮은 것으로 분석된다.\n이는 공정 중 용수가 제품에 함유되거나 증발·손실되는 비율이 존재하기 때문으로 설명되고 있으며, 이러한 산업 통계는 실험실 및 연구개발 환경에서도 용수 사용량 대비 폐수 발생량 차이가 구조적으로 발생할 수 있음을 뒷받침하는 참고 자료로 활용될 수 있다."]}, "wastewaterMismatch": {"title": "폐수 배출량 비일치의 건", "source": "4. 폐수 배출량 비일치 인용의 건.xlsx", "lines": ["① 폐수의 비중과 용존고형물(TDS) 관계에 대한 설명 정리문", "UPDATE: 2026-02-04", "폐수는 용존고형물(TDS) 증가에 따라 비중이 변할 수 있으며, 비중–용존고형물 간 상관관계에 대한 경험식이 보고되어 있음", "폐수는 순수한 물이 아니라 다양한 용존고형물(TDS) 및 무기·유기 성분을 포함하고 있어, 해당 성분의 농도 증가에 따라 폐수의 비중(specific gravity) 이 변화할 수 있다.\n일반적으로 용존고형물 농도가 증가할수록 단위 부피당 질량이 증가하므로, 동일한 부피의 폐수라 하더라도 순수 물(비중 1.0) 대비 실제 무게는 더 크게 나타날 수 있다.\n이와 같은 폐수의 비중 변화는 실험실 폐수뿐 아니라 산업폐수 전반에서 관찰되는 현상으로, 용존고형물 농도(TDS)와 비중 간의 관계에 대해서는 경험식(empirical relationship)을 통해 상관관계가 보고된 바 있다.\n따라서 폐수를 부피 기준으로 환산하여 관리하는 경우, 실제 수거·계근 시 측정되는 무게 기준 폐수량과는 폐수 성상(TDS 농도)에 따라 일정 수준의 차이가 발생할 수 있다.\n※ 폐수는 용존고형물(TDS) 함유로 인해 비중이 순수 물과 달라질 수 있으며, TDS 농도 증가에 따른 비중 변화는 경험적 상관관계로 보고되어 있다.", "② Standard Methods 2540(SOLIDS) 내용을 바탕으로 한 정리문", "폐수의 총고형물·부유고형물·용존고형물 개념 및 표준시험법 근거 정리", "폐수는 순수한 물이 아니라 다양한 고형 성분을 포함한 혼합물로, 그 성상은 총고형물(Total Solids, TS), 부유고형물(Total Suspended Solids, TSS), 용존고형물(Total Dissolved Solids, TDS) 개념으로 구분하여 관리된다.\n이러한 고형물 개념은 Standard Methods for the Examination of Water and Wastewater의 Method 2540 (SOLIDS)에서 공식적으로 정의되어 있으며, 각 항목은 표준화된 시험 절차에 따라 측정하도록 규정되어 있다.\n표준시험법에 따르면,\n*총고형물(TS)은 시료를 증발·건조한 후 남는 모든 잔류물의 질량으로 정의되며,\n*부유고형물(TSS)은 여과지에 포집되는 고형물,\n*용존고형물(TDS)은 여과지를 통과한 후 잔류하는 용존 성분으로 구분된다.\n즉, 폐수는 단순한 액체 부피가 아닌, 고형물 함량과 조성에 따라 성상이 달라지는 물질로 정의·관리되며, 이러한 고형물 개념은 폐수의 처리, 규제 기준 설정 및 계측 결과 해석의\n기본 전제로 활용되고 있다.\n※ 폐수는 ‘물’이 아니라, 표준시험법에서 정의한 고형물(TS/TSS/TDS) 개념으로 관리되는 대상이다.", "③ EPA NPDES Compliance Inspection Manual의 실제 취지에 맞춘 정리문", "EPA NPDES 점검 지침의 유량·계측 정확도 관련 근거 정리", "미국 환경보호청(EPA)의 NPDES Compliance Inspection Manual은 폐수 배출시설 점검 시 유량 및 계측 데이터의 정확성을 규제 준수 여부 판단의 핵심 요소로 보고 있다.\n해당 지침에서는 점검관이 단순히 기록된 수치만을 확인하는 것이 아니라, 유량·계측 시스템이 적절하게 설치·운영·유지관리되고 있는지, 측정 방법이 시설 여건에 타당하게 적용되고 있는지, 그리고 보정(calibration) 및 기록 관리가 적정하게 이루어지고 있는지를 함께 평가하도록 하고 있다.\n특히 수위(헤드) 기반 환산 방식이나 유량계 측정 방식은 설치 조건, 관리 상태, 보정 주기 등에 따라 측정값의 정확도에 영향을 받을 수 있음을 전제로 하며, 이에 따라 점검 시 계측 방식의 적정성과 데이터 신뢰성이 중요한 확인 항목으로 다루어진다.\n따라서 폐수량을 수위 또는 유량 기반으로 계측·관리하는 경우, 계측 방식과 관리 조건에 따라 일정 수준의 오차 가능성이 존재함을 점검 대응 시 합리적으로 설명할 수 있다.\n※ EPA는 ‘계측값’보다 ‘계측이 제대로 이루어졌는지’를 본다."]}};

let user=null,currentRole='user',currentTab='daily',ledgerMonthFilter='',pickupYearFilter='',pickupTypeFilter='전체',yearlyReportFilter='',refTab='facilities',refSearch='';
let dailyRows=[],pickupRows=[],userRows=[],logRows=[],approvalRows=[],referenceDocs=[];

function escapeHtml(str){return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function round2(v){return Math.round((Number(v||0)+Number.EPSILON)*100)/100;}
function cmToM3(cm){return round2((Number(cm||0)/CM_LIMIT)*MAX_TON_M3);}
function formatNum(v,d=2){if(v===null||v===undefined||v===''||Number.isNaN(Number(v)))return '-'; return Number(v).toFixed(d);}
function roleLabel(role){
  if(role==='user') return '사용자';
  if(role==='operator') return '운영자';
  if(role==='supervisor') return '책임자';
  if(role==='admin') return '관리자';
  return role;
}
function roleBadge(role){return `<span class="role-badge ${role}">${escapeHtml(roleLabel(role))}</span>`;}
function getTodayGuidelineText(totalCm){return totalCm>CM_LIMIT?`OVER ${CM_LIMIT}`:`${formatNum(cmToM3(totalCm),2)} m³`;}
function canWrite(){return currentRole==='admin'||currentRole==='operator';}
function canDelete(){return currentRole==='admin'||currentRole==='operator';}
function canAdmin(){return currentRole==='admin';}
function canDownload(){return currentRole==='admin'||currentRole==='operator';}
function canWriterApprove(){return currentRole==='admin'||currentRole==='operator';}
function canReviewerApprove(){return currentRole==='admin'||currentRole==='supervisor';}
function monthKeyFromDate(v){return String(v||'').slice(0,7);}
function yearKeyFromDate(v){return String(v||'').slice(0,4);}
function getDefaultLedgerMonth(){const d=dailyRows.length?dailyRows[0].date:new Date().toISOString().slice(0,10);return monthKeyFromDate(d);}
function getPickupYears(){const years=[...new Set(pickupRows.map(r=>yearKeyFromDate(r.pickup_date)).filter(Boolean))].sort((a,b)=>Number(b)-Number(a)); const cy=String(new Date().getFullYear()); if(!years.includes(cy))years.unshift(cy); return years;}
function getDefaultPickupYear(){return getPickupYears()[0]||String(new Date().getFullYear());}
function getAvailableYears(){const years=[...new Set([...dailyRows.map(r=>yearKeyFromDate(r.date)).filter(Boolean),...pickupRows.map(r=>yearKeyFromDate(r.pickup_date)).filter(Boolean)])].sort((a,b)=>Number(b)-Number(a)); const cy=String(new Date().getFullYear()); if(!years.includes(cy))years.unshift(cy); return years;}
function getDefaultYearlyReportYear(){return getAvailableYears()[0]||String(new Date().getFullYear());}

async function sendApprovalMail(monthKey){
  const reviewer = getReviewerCandidateEmail();
  const link = buildLedgerLink(monthKey);

  if(!reviewer){
    return renderApp('검토자 이메일이 없습니다.','err');
  }

  try {
    const res = await fetch('https://wjxyspuieuzfhfosmpin.supabase.co/functions/v1/resend-email', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        reviewerEmail: reviewer,
        month: monthKey,
        link: link
      })
    });

    const rawText = await res.text();
    let data = {};
    try {
      data = rawText ? JSON.parse(rawText) : {};
    } catch (_) {
      data = { raw: rawText };
    }

    if(!res.ok){
      console.error('mail send failed', data);
      return renderApp('검토요청 메일 발송 실패', 'err');
    }

    console.log('mail result', data);
    return renderApp('작성자 결재 완료 및 검토요청 메일 발송 완료', 'ok');
  } catch(e) {
    console.error(e);
    return renderApp('검토요청 메일 발송 중 오류 발생', 'err');
  }
}

function getMonthlyReportData(monthKey){const stats=getDerivedStats(); const ledgerRows=[...stats.enrichedDaily].filter(r=>monthKeyFromDate(r.date)===monthKey).sort((a,b)=>String(a.date).localeCompare(String(b.date))); const pickupMonthRows=[...pickupRows].filter(r=>monthKeyFromDate(r.pickup_date)===monthKey).sort((a,b)=>String(a.pickup_date).localeCompare(String(b.pickup_date))); const wastewaterRows=pickupMonthRows.filter(r=>(r.pickup_type||'폐수')==='폐수'); const wasteRows=pickupMonthRows.filter(r=>(r.pickup_type||'폐수')==='폐기물'); const totalWaterUse=round2(ledgerRows.reduce((s,r)=>s+safeNumber(r.water_used),0)); const totalEntrusted=round2(wastewaterRows.reduce((s,r)=>s+safeNumber(r.entrusted_amount),0)); const overRows=ledgerRows.filter(r=>safeNumber(r.total_cm)>CM_LIMIT); const maxHeight=ledgerRows.length?Math.max(...ledgerRows.map(r=>safeNumber(r.total_cm))):0; const externalCount=ledgerRows.filter(r=>!!r.has_external).length; const wasteCounts=summarizeWasteCounts(wasteRows); const approval=getApprovalRow(monthKey); return {monthKey,monthLabel:formatMonthLabel(monthKey),ledgerRows,pickupMonthRows,wastewaterRows,wasteRows,totalWaterUse,totalEntrusted,overRows,overCount:overRows.length,maxHeight,externalCount,wasteCounts,wastewaterPickupCount:wastewaterRows.length,wastePickupCount:wasteRows.length,approval};}
function getYearlyReportData(year){const stats=getDerivedStats(); const yearLedgerRows=stats.enrichedDaily.filter(r=>yearKeyFromDate(r.date)===year); const yearPickupRows=pickupRows.filter(r=>yearKeyFromDate(r.pickup_date)===year); const monthlyMap={}; for(let m=1;m<=12;m++){const mm=String(m).padStart(2,'0'); monthlyMap[`${year}-${mm}`]={monthKey:`${year}-${mm}`,label:`${m}월`,waterUse:0,entrusted:0,overCount:0,wasteAlkali:0,wasteAcid:0,wasteOrganicSolid:0,wasteOrganicBottle:0};} yearLedgerRows.forEach(r=>{const mk=monthKeyFromDate(r.date); if(!monthlyMap[mk]) return; monthlyMap[mk].waterUse+=safeNumber(r.water_used); if(safeNumber(r.total_cm)>CM_LIMIT) monthlyMap[mk].overCount+=1;}); yearPickupRows.forEach(r=>{const mk=monthKeyFromDate(r.pickup_date); if(!monthlyMap[mk]) return; const type=r.pickup_type||'폐수'; if(type==='폐수') monthlyMap[mk].entrusted+=safeNumber(r.entrusted_amount); else {monthlyMap[mk].wasteAlkali+=safeNumber(r.waste_alkali_count);monthlyMap[mk].wasteAcid+=safeNumber(r.waste_acid_count);monthlyMap[mk].wasteOrganicSolid+=safeNumber(r.waste_organic_solid_count);monthlyMap[mk].wasteOrganicBottle+=safeNumber(r.waste_organic_bottle_count);} }); const monthlyRows=Object.values(monthlyMap).map(r=>({...r,waterUse:round2(r.waterUse),entrusted:round2(r.entrusted)})); const totalWaterUse=round2(monthlyRows.reduce((s,r)=>s+safeNumber(r.waterUse),0)); const totalEntrusted=round2(monthlyRows.reduce((s,r)=>s+safeNumber(r.entrusted),0)); const totalOverCount=monthlyRows.reduce((s,r)=>s+safeNumber(r.overCount),0); const wasteTotals=monthlyRows.reduce((a,r)=>{a.alkali+=safeNumber(r.wasteAlkali);a.acid+=safeNumber(r.wasteAcid);a.organicSolid+=safeNumber(r.wasteOrganicSolid);a.organicBottle+=safeNumber(r.wasteOrganicBottle);return a;},{alkali:0,acid:0,organicSolid:0,organicBottle:0}); return {year,monthlyRows,totalWaterUse,totalEntrusted,totalOverCount,wasteTotals,topOverMonth:[...monthlyRows].sort((a,b)=>b.overCount-a.overCount)[0],topWaterMonth:[...monthlyRows].sort((a,b)=>b.waterUse-a.waterUse)[0],topEntrustedMonth:[...monthlyRows].sort((a,b)=>b.entrusted-a.entrusted)[0]};}

function getFilteredReferenceLinesFromBody(bodyText){
  const lines = String(bodyText||'').split(/\r?\n/);
  const cleaned = lines.filter(line=>{
    const s=String(line??'').trim();
    if(!s) return true;
    const normalized=s.replace(/\s+/g,' ').trim();
    if(s==='#VALUE!') return false;
    if(/^#VALUE!(\s+#VALUE!)*$/i.test(normalized)) return false;
    return true;
  });
  if(!refSearch.trim()) return cleaned;
  const q=refSearch.trim().toLowerCase();
  return cleaned.filter(line=>String(line).toLowerCase().includes(q));
}

function renderDocBodyFromText(bodyText){
  const lines = getFilteredReferenceLinesFromBody(bodyText);
  if(!lines.length) return `<div class="doc-empty">검색 결과가 없습니다.</div>`;

  let mode = null;
  return lines.map(rawLine=>{
    const line = String(rawLine||'');
    const trimmed = line.trim();
    if(!trimmed){
      mode = null;
      return `<div class="doc-spacer"></div>`;
    }
    const escaped = escapeHtml(trimmed);
    let styled = escaped;
    styled = styled.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    styled = styled.replace(/\[\[big\]\](.*?)\[\[\/big\]\]/g, '<span style="font-size:18px;font-weight:700;">$1</span>');
    styled = styled.replace(/\[\[small\]\](.*?)\[\[\/small\]\]/g, '<span style="font-size:12px;color:#667085;">$1</span>');

    if (/^Q\d+[\.\)]?/i.test(trimmed) || /^Q\./i.test(trimmed) || trimmed.startsWith('Q ')){
      mode = 'Q';
      return `<div class="doc-question">${styled}</div>`;
    }
    if (/^A[\.\)]?/i.test(trimmed) || trimmed.startsWith('A ')){
      mode = 'A';
      return `<div class="doc-answer">${styled}</div>`;
    }
    if (
      trimmed.includes('①') || trimmed.includes('②') || trimmed.includes('③') ||
      trimmed.includes('④') || trimmed.includes('⑤') || trimmed.startsWith('[')
    ){
      mode = null;
      return `<div class="doc-section">${styled}</div>`;
    }
    if (mode === 'A'){
      return `<div class="doc-answer">${styled}</div>`;
    }
    return `<div class="doc-text">${styled}</div>`;
  }).join('');
}


function formatText(type){
  const textarea = document.getElementById('ref-body-input');
  if(!textarea) return;

  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selected = textarea.value.substring(start, end);

  if(!selected) return;

  let newText = selected;

  if(type === 'bold'){
    newText = `**${selected}**`;
  } else if(type === 'big'){
    newText = `[[big]]${selected}[[/big]]`;
  } else if(type === 'small'){
    newText = `[[small]]${selected}[[/small]]`;
  }

  textarea.value =
    textarea.value.substring(0, start) +
    newText +
    textarea.value.substring(end);

  textarea.focus();
  textarea.selectionStart = start;
  textarea.selectionEnd = start + newText.length;
}

  if(!title) return renderApp('문서 제목을 입력하세요.','err');

  const payload = {
    doc_key: refTab,
    title,
    body,
    updated_at: new Date().toISOString(),
    updated_by: user?.email || ''
  };

  const existing = referenceDocs.find(d=>d.doc_key===refTab);
  let result;
  if(existing?.id){
    result = await sb.from(REFERENCE_TABLE).update(payload).eq('id', existing.id);
  }else{
    result = await sb.from(REFERENCE_TABLE).insert([payload]);
  }
  if(result.error) return renderApp('운영 관련자료 저장 실패: ' + result.error.message,'err');
  await logActivity('save','reference_doc',refTab,{title});

}

async function signWriter(monthKey){

  const payload = {
    month_key: monthKey,
    writer_email: user.email,
    writer_signed_at: new Date().toISOString(),
    is_locked: false
  };

  let result;
  if(row){
    result = await sb.from(APPROVAL_TABLE).update(payload).eq('month_key', monthKey);
  }else{
    result = await sb.from(APPROVAL_TABLE).insert([payload]);
  }

  if(result.error) return renderApp('작성자 결재 실패: ' + result.error.message, 'err');

  await logApprovalAction(monthKey,'writer_sign');

  // 👇 이 줄 중요
  await loadAll('작성자 결재 완료','ok');

  // 🚀 이 줄 추가 (핵심)
  await sendApprovalMail(monthKey);
}

function buildMonthlyReportHtml(monthKey){const data=getMonthlyReportData(monthKey); const overDates=data.overRows.length?data.overRows.map(r=>`${r.date} (${formatNum(r.total_cm,1)}cm)`).join(', '):'없음'; const ledgerRows=data.ledgerRows.map(r=>`<tr><td>${escapeHtml(r.date)}</td><td>${formatNum(r.water_prev,2)}</td><td>${formatNum(r.usage,2)}</td><td>${formatNum(r.water_used,2)}</td><td>${formatNum(r.height,1)}</td><td>${r.has_external?`${formatNum(r.external_ton||0,1)}T / ${formatNum(r.external_cm,1)}cm`:'-'}</td><td>${formatNum(r.total_cm,1)}</td><td>${escapeHtml(r.guideline_text)}</td><td>${escapeHtml(r.generated_text)}</td><td>${escapeHtml(r.note||'')}</td></tr>`).join(''); const pickupRowsHtml=data.pickupMonthRows.map(r=>`<tr><td>${escapeHtml(r.pickup_date)}</td><td>${escapeHtml(r.pickup_type||'폐수')}</td><td>${escapeHtml(getPickupDetailText(r))}</td><td>${escapeHtml(r.certificate_no||'')}</td><td>${escapeHtml(r.contractor||'')}</td><td>${escapeHtml(r.note||'')}</td></tr>`).join(''); const approval=data.approval||{}; return `<html><head><meta charset="UTF-8"><title>월간 운영 보고서</title>${getReportBaseStyle()}</head><body><div class="page"><div class="header"><div class="title">폐수배출시설 월간 운영 보고서</div><div class="sub">${escapeHtml(formatMonthLabel(monthKey))} 기준</div></div><div class="kpi-grid"><div class="kpi"><div class="kpi-label">총 용수 사용량</div><div class="kpi-value">${formatNum(data.totalWaterUse,2)} m³</div></div><div class="kpi"><div class="kpi-label">총 폐수 위탁량</div><div class="kpi-value">${formatNum(data.totalEntrusted,2)} m³</div></div><div class="kpi"><div class="kpi-label">폐기물 수거 건수</div><div class="kpi-value">${data.wastePickupCount}건</div></div><div class="kpi"><div class="kpi-label">OVER 발생일수</div><div class="kpi-value">${data.overCount}일</div></div></div><div class="two-col"><div class="section"><div class="section-title">이상 발생 요약</div><div class="box small"><div style="margin-bottom:8px;"><span class="badge-red">OVER 날짜</span></div><div>${escapeHtml(overDates)}</div><div style="margin-top:10px;"><b>최고 수위:</b> ${formatNum(data.maxHeight,1)} cm</div><div style="margin-top:6px;"><b>외부보관 발생:</b> ${data.externalCount}일</div></div></div><div class="section"><div class="section-title">수거 요약</div><div class="box small"><div><span class="badge-blue">폐수 수거</span> ${data.wastewaterPickupCount}건 / 총 ${formatNum(data.totalEntrusted,2)}m³</div><div style="margin-top:8px;"><span class="badge-amber">폐기물 수거</span> ${data.wastePickupCount}건</div><div style="margin-top:10px;">폐알칼리 ${data.wasteCounts.alkali} / 폐산 ${data.wasteCounts.acid} / 고상 ${data.wasteCounts.organicSolid} / 폐시약병 ${data.wasteCounts.organicBottle}</div></div></div></div><div class="section"><div class="section-title">특이사항</div><div class="box small">${data.overCount>0?`당월 OVER ${data.overCount}일 발생.`:`당월 OVER 발생 없음.`} ${data.externalCount>0?`외부보관 발생 ${data.externalCount}일 확인.`:`외부보관 발생 없음.`}</div></div><div class="sign-row"><div class="sign-box"><div class="sign-title">작성자</div>${renderSignatureHtml(approval.writer_email,approval.writer_signed_at)}</div><div class="sign-box"><div class="sign-title">검토자</div>${renderSignatureHtml(approval.reviewer_email,approval.reviewer_signed_at)}</div><div class="sign-box"><div class="sign-title">작성일</div><div class="sign-image-wrap"></div><div class="sign-date">${escapeHtml(new Date().toLocaleDateString('ko-KR'))}</div></div></div></div><div class="page"><div class="header"><div class="title">상세 내역</div><div class="sub">${escapeHtml(formatMonthLabel(monthKey))}</div></div><div class="section"><div class="section-title">운영일지 내역</div><table><thead><tr><th>날짜</th><th>용수 전일</th><th>용수 금일</th><th>당일 사용량</th><th>저장고 높이</th><th>외부보관</th><th>총높이</th><th>금일지침</th><th>총 발생량</th><th>비고</th></tr></thead><tbody>${ledgerRows||`<tr><td colspan="10">데이터 없음</td></tr>`}</tbody></table></div><div class="section"><div class="section-title">수거내역</div><table><thead><tr><th>수거일</th><th>구분</th><th>세부내용</th><th>확인서번호</th><th>처리업소</th><th>비고</th></tr></thead><tbody>${pickupRowsHtml||`<tr><td colspan="6">데이터 없음</td></tr>`}</tbody></table></div></div></body></html>`;}
function buildYearlyReportHtml(year){const data=getYearlyReportData(year); const waterChart=makeBarChartSvg({title:'월별 용수 사용량',labels:data.monthlyRows.map(r=>r.label),values:data.monthlyRows.map(r=>round2(r.waterUse)),unit:'m³',color:'#2563eb'}); const entrustedChart=makeBarChartSvg({title:'월별 폐수 위탁량',labels:data.monthlyRows.map(r=>r.label),values:data.monthlyRows.map(r=>round2(r.entrusted)),unit:'m³',color:'#0f9d58'}); const overChart=makeBarChartSvg({title:'월별 OVER 발생 횟수',labels:data.monthlyRows.map(r=>r.label),values:data.monthlyRows.map(r=>r.overCount),unit:'일',color:'#f04438'}); const wasteTotalChart=makeBarChartSvg({title:'폐기물 종류별 총합',labels:['폐알칼리','폐산','고상','폐시약병'],values:[data.wasteTotals.alkali,data.wasteTotals.acid,data.wasteTotals.organicSolid,data.wasteTotals.organicBottle],unit:'개수',color:'#f79009'}); const wasteMonthlyStackedChart=makeStackedBarChartSvg({title:'월별 폐기물 추이',labels:data.monthlyRows.map(r=>r.label),series:[{name:'폐알칼리',values:data.monthlyRows.map(r=>r.wasteAlkali)},{name:'폐산',values:data.monthlyRows.map(r=>r.wasteAcid)},{name:'고상',values:data.monthlyRows.map(r=>r.wasteOrganicSolid)},{name:'폐시약병',values:data.monthlyRows.map(r=>r.wasteOrganicBottle)}],colors:['#f79009','#f04438','#12b76a','#6172f3'],unit:'개수'}); const monthlyRowsHtml=data.monthlyRows.map(r=>`<tr><td>${escapeHtml(r.label)}</td><td>${formatNum(r.waterUse,2)}</td><td>${formatNum(r.entrusted,2)}</td><td>${r.overCount}</td><td>${r.wasteAlkali}</td><td>${r.wasteAcid}</td><td>${r.wasteOrganicSolid}</td><td>${r.wasteOrganicBottle}</td></tr>`).join(''); return `<html><head><meta charset="UTF-8"><title>연간 운영 보고서</title>${getReportBaseStyle()}</head><body><div class="page"><div class="header"><div class="title">폐수배출시설 연간 운영 보고서</div><div class="sub">${escapeHtml(year)}년 기준</div></div><div class="kpi-grid"><div class="kpi"><div class="kpi-label">연간 총 용수 사용량</div><div class="kpi-value">${formatNum(data.totalWaterUse,2)} m³</div></div><div class="kpi"><div class="kpi-label">연간 총 폐수 위탁량</div><div class="kpi-value">${formatNum(data.totalEntrusted,2)} m³</div></div><div class="kpi"><div class="kpi-label">연간 OVER 발생일수</div><div class="kpi-value">${data.totalOverCount}일</div></div><div class="kpi"><div class="kpi-label">연간 폐기물 총 수량</div><div class="kpi-value">${data.wasteTotals.alkali+data.wasteTotals.acid+data.wasteTotals.organicSolid+data.wasteTotals.organicBottle}개</div></div></div><div class="three-col"><div class="box small"><div style="font-weight:800;margin-bottom:6px;">용수 사용량 최대 월</div><div>${escapeHtml(data.topWaterMonth?.label||'-')} / ${formatNum(data.topWaterMonth?.waterUse||0,2)}m³</div></div><div class="box small"><div style="font-weight:800;margin-bottom:6px;">위탁량 최대 월</div><div>${escapeHtml(data.topEntrustedMonth?.label||'-')} / ${formatNum(data.topEntrustedMonth?.entrusted||0,2)}m³</div></div><div class="box small"><div style="font-weight:800;margin-bottom:6px;">OVER 집중 월</div><div>${escapeHtml(data.topOverMonth?.label||'-')} / ${data.topOverMonth?.overCount||0}일</div></div></div><div class="section">${waterChart}</div><div class="section">${entrustedChart}</div></div><div class="page"><div class="header"><div class="title">연간 분석 및 폐기물 추이</div><div class="sub">${escapeHtml(year)}년 기준</div></div><div class="section">${overChart}</div><div class="section">${wasteTotalChart}</div><div class="section">${wasteMonthlyStackedChart}</div></div><div class="page"><div class="header"><div class="title">월별 요약표</div><div class="sub">${escapeHtml(year)}년 기준</div></div><div class="section"><table><thead><tr><th>월</th><th>용수 사용량</th><th>폐수 위탁량</th><th>OVER 일수</th><th>폐알칼리</th><th>폐산</th><th>고상</th><th>폐시약병</th></tr></thead><tbody>${monthlyRowsHtml}</tbody></table></div></div></body></html>`;}
function openReportPrintWindow(html){const win=window.open('','_blank'); if(!win) return renderApp('팝업이 차단되어 보고서를 열 수 없습니다.','err'); win.document.open(); win.document.write(html); win.document.close(); setTimeout(()=>{win.focus(); win.print();},500);}
function downloadMonthlyReportPdf(){if(!canDownload()) return renderApp('월보고서 출력 권한이 없습니다.','err'); const month=document.getElementById('ledger-month')?.value||ledgerMonthFilter; if(!month) return renderApp('월보고서 기준 월이 없습니다.','err'); openReportPrintWindow(buildMonthlyReportHtml(month));}
function downloadYearlyReportPdf(){if(!canDownload()) return renderApp('연보고서 출력 권한이 없습니다.','err'); const year=yearlyReportFilter||getDefaultYearlyReportYear(); if(!year) return renderApp('연보고서 기준 연도가 없습니다.','err'); openReportPrintWindow(buildYearlyReportHtml(year));}
function downloadMonthlyExcel(){if(!canDownload()) return renderApp('엑셀 다운로드 권한이 없습니다.','err'); const month=document.getElementById('ledger-month')?.value||ledgerMonthFilter||monthKeyFromDate(new Date().toISOString().slice(0,10)); const stats=getDerivedStats(); const ledgerRows=[...stats.enrichedDaily].filter(r=>monthKeyFromDate(r.date)===month).sort((a,b)=>String(b.date).localeCompare(String(a.date))||String(b.created_at||'').localeCompare(String(a.created_at||''))); const pickupFiltered=pickupRows.filter(r=>monthKeyFromDate(r.pickup_date)===month).sort((a,b)=>String(b.pickup_date).localeCompare(String(a.pickup_date))||String(b.created_at||'').localeCompare(String(a.created_at||''))); const logsFiltered=logRows.filter(r=>monthKeyFromDate(r.created_at)===month); const sheet1=[['날짜','용수전일','용수금일','당일사용량','저장고높이','외부보관','계산용총높이','금일지침','총발생량','수거정보','기타'],...ledgerRows.map(r=>[r.date,formatNum(r.water_prev,2),formatNum(r.usage,2),formatNum(r.water_used,2),formatNum(r.height,1),r.has_external?`${formatNum(r.external_ton||0,1)}T / ${formatNum(r.external_cm,1)}cm`:'-',formatNum(r.total_cm,1),r.guideline_text,r.generated_text,r.pickup?`위탁 ${formatNum(r.pickup.entrusted_amount,2)} / 후높이 ${String(r.pickup.after_pickup_cm??'-')}`:'-',r.note||''])]; const sheet2=[['수거일','구분','세부내용','확인서번호','처리업소','비고'],...pickupFiltered.map(r=>[r.pickup_date,r.pickup_type||'폐수',getPickupDetailText(r),r.certificate_no||'',r.contractor||'',r.note||''])]; const sheet3=[['시간','사용자','동작','대상','상세'],...logsFiltered.map(r=>[r.created_at||'',r.actor_email||'',r.action||'',`${r.target_type||''}/${r.target_id||''}`,r.details||''])]; const workbookHtml=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body>${tableToHtml('운영일지',sheet1)}<br/><br/>${tableToHtml('수거등록',sheet2)}<br/><br/>${tableToHtml('로그',sheet3)}</body></html>`; downloadFile(`폐수운영일지_${month}.xls`,workbookHtml,'application/vnd.ms-excel;charset=utf-8;');}
function tableToHtml(title,rows){return `<table border="1"><tr><th colspan="${rows[0]?.length||1}" style="background:#dbe5f1;">${escapeHtml(title)}</th></tr>${rows.map((row,idx)=>`<tr>${row.map(cell=>idx===0?`<th>${escapeHtml(cell)}</th>`:`<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}</table>`;}
window.login=login; window.signup=signup; window.logout=logout; window.sendApprovalMail=sendApprovalMail; window.saveReferenceDoc=saveReferenceDoc; window.toggleWriterApproval=toggleWriterApproval; window.toggleReviewerApproval=toggleReviewerApproval; window.sendReviewerRequestMail=sendReviewerRequestMail; window.formatText=formatText; window.switchTab=switchTab; window.changeLedgerMonth=changeLedgerMonth; window.changePickupYear=changePickupYear; window.changePickupTypeFilter=changePickupTypeFilter; window.changeYearlyReportYear=changeYearlyReportYear; window.changeRefTab=changeRefTab; window.changeRefSearch=changeRefSearch; window.setPickupType=setPickupType; window.togglePickupType=togglePickupType; window.updateDailyPreview=updateDailyPreview; window.toggleExternalBox=toggleExternalBox; window.saveDailyRow=saveDailyRow; window.savePickupRow=savePickupRow; window.deleteDailyRow=deleteDailyRow; window.deletePickupRow=deletePickupRow; window.signWriter=signWriter; window.unsignWriter=unsignWriter; window.signReviewer=signReviewer; window.unsignReviewer=unsignReviewer; window.resetApproval=resetApproval; window.changeRole=changeRole; window.uploadSignatureForUser=uploadSignatureForUser; window.transferAdmin=transferAdmin; window.seedSampleData=seedSampleData; window.downloadMonthlyExcel=downloadMonthlyExcel; window.downloadMonthlyReportPdf=downloadMonthlyReportPdf; window.downloadYearlyReportPdf=downloadYearlyReportPdf;
init();
</script></body></html>
