<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>폐수 관리 앱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">로딩중...</div>

<script>
const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init() {
  const { data, error } = await supabase.auth.getUser();

  if (data && data.user) {
    showApp(data.user);
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById("app").innerHTML = `
    <h2>로그인</h2>
    <input id="email" placeholder="이메일"><br><br>
    <input id="password" type="password" placeholder="비밀번호"><br><br>
    <button onclick="login()">로그인</button>
    <button onclick="signup()">회원가입</button>
  `;
}

function showApp(user) {
  document.getElementById("app").innerHTML = `
    <h2>폐수 관리 앱</h2>
    <p>${user.email}</p>
    <button onclick="logout()">로그아웃</button>
  `;
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) alert(error.message);
  else location.reload();
}

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) alert(error.message);
  else alert("가입 완료! 로그인하세요");
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

init();
</script>

</body>
</html>
