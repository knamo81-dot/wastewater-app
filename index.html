<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폐수배출시설 운영일지</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f8fafc; color:#0f172a; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px; }
    .card { background:#fff; border:1px solid #dbe2ea; border-radius:16px; padding:20px; }
    h1,h2 { margin:0 0 12px; }
    .sub { color:#64748b; margin-bottom:18px; }
    .field { margin-bottom: 14px; }
    .field label { display:block; font-size:14px; font-weight:700; margin-bottom:6px; }
    input, textarea { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #dbe2ea; border-radius:10px; font-size:14px; }
    textarea { min-height: 88px; resize: vertical; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    button { border:none; background:#0f172a; color:#fff; padding:12px 14px; border-radius:10px; cursor:pointer; font-weight:700; }
    button.secondary { background:#fff; color:#0f172a; border:1px solid #dbe2ea; }
    .msg { margin-top:12px; font-size:14px; white-space:pre-wrap; }
    .err { color:#b91c1c; }
    .ok { color:#166534; }
    .muted { color:#64748b; }
    table { width:100%; border-collapse:collapse; margin-top:18px; background:#fff; }
    th, td { border-bottom:1px solid #dbe2ea; padding:10px; text-align:left; font-size:14px; }
    th { background:#f1f5f9; }
  </style>
</head>
<body>
  <div id="root" class="wrap">로딩중...</div>

  <script>
    (() => {
      const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
      const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";

      const root = document.getElementById('root');
      let sb = null;
      let currentUser = null;
      let rows = [];

      function escapeHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderLogin(message = '', kind = 'muted') {
        root.innerHTML = `
          <div class="card" style="max-width:420px;margin:40px auto;">
            <h2>로그인</h2>
            <div class="field">
              <label>이메일</label>
              <input id="email" type="email" placeholder="이메일" />
            </div>
            <div class="field">
              <label>비밀번호</label>
              <input id="password" type="password" placeholder="비밀번호" />
            </div>
            <div class="row">
              <button id="loginBtn" type="button">로그인</button>
              <button id="signupBtn" class="secondary" type="button">회원가입</button>
            </div>
            <div class="msg ${kind}">${escapeHtml(message || '로그인 또는 회원가입을 진행하세요.')}</div>
          </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('signupBtn').addEventListener('click', signup);
      }

      function renderApp(message = '', kind = 'muted') {
        const rowsHtml = rows.map(r => `
          <tr>
            <td>${escapeHtml(r.date)}</td>
            <td>${Number(r.usage ?? 0).toFixed(2)}</td>
            <td>${Number(r.height ?? 0).toFixed(1)}</td>
            <td>${escapeHtml(r.note || '')}</td>
            <td>${escapeHtml(r.created_at || '')}</td>
          </tr>
        `).join('');

        root.innerHTML = `
          <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div>
              <h1>폐수배출시설 운영일지</h1>
              <div class="sub">연동 저장 테스트 버전</div>
            </div>
            <div>
              <div style="margin-bottom:8px;">${escapeHtml(currentUser?.email || '')}</div>
              <button id="logoutBtn" class="secondary" type="button">로그아웃</button>
            </div>
          </div>

          <div class="card">
            <div class="field"><label>날짜</label><input id="date" type="date" /></div>
            <div class="field"><label>용수 금일 지침 (m³)</label><input id="usage" type="number" step="0.01" /></div>
            <div class="field"><label>폐수 높이 (cm)</label><input id="height" type="number" step="0.1" /></div>
            <div class="field"><label>기타사항</label><textarea id="note"></textarea></div>
            <div class="row">
              <button id="saveBtn" type="button">저장</button>
              <button id="reloadBtn" class="secondary" type="button">새로고침</button>
            </div>
            <div class="msg ${kind}">${escapeHtml(message || '')}</div>
          </div>

          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>용수</th>
                <th>폐수높이</th>
                <th>기타</th>
                <th>저장시간</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml || '<tr><td colspan="5">저장된 데이터가 없습니다.</td></tr>'}
            </tbody>
          </table>
        `;

        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('saveBtn').addEventListener('click', saveRow);
        document.getElementById('reloadBtn').addEventListener('click', loadRows);
      }

      async function init() {
        try {
          if (!window.supabase || !window.supabase.createClient) {
            throw new Error('Supabase 라이브러리 로드 실패');
          }
          sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

          const { data, error } = await sb.auth.getSession();
          if (error) throw error;

          if (data?.session?.user) {
            currentUser = data.session.user;
            await loadRows();
          } else {
            renderLogin();
          }
        } catch (e) {
          root.innerHTML = `<div class="card"><h2>오류</h2><div class="msg err">${escapeHtml(e.message || e)}</div></div>`;
        }
      }

      async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          renderLogin(error.message, 'err');
          return;
        }
        await init();
      }

      async function signup() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const { error } = await sb.auth.signUp({ email, password });
        if (error) {
          renderLogin(error.message, 'err');
          return;
        }
        renderLogin('회원가입 완료. 이메일 인증이 필요한 경우 메일 확인 후 다시 로그인하세요.', 'ok');
      }

      async function logout() {
        await sb.auth.signOut();
        currentUser = null;
        renderLogin('로그아웃되었습니다.', 'ok');
      }

      async function loadRows() {
        const { data, error } = await sb
          .from('wastewater')
          .select('*')
          .order('date', { ascending: false });

        if (error) {
          renderApp('조회 실패: ' + error.message, 'err');
          return;
        }
        rows = data || [];
        renderApp();
      }

      async function saveRow() {
        const date = document.getElementById('date').value;
        const usage = document.getElementById('usage').value;
        const height = document.getElementById('height').value;
        const note = document.getElementById('note').value;

        if (!date || usage === '' || height === '') {
          renderApp('날짜, 용수, 폐수 높이는 입력해야 합니다.', 'err');
          return;
        }

        const { error } = await sb.from('wastewater').insert([{
          date,
          usage: parseFloat(usage),
          height: parseFloat(height),
          note
        }]);

        if (error) {
          renderApp('저장 실패: ' + error.message, 'err');
          return;
        }

        await loadRows();
        renderApp('저장 완료', 'ok');
      }

      init();
    })();
  </script>
</body>
</html>
