<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폐수배출시설 운영일지</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #dbe2ea;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;
      --danger: #b91c1c;
      --danger-bg: #fee2e2;
      --ok-bg: #dcfce7;
      --ok-text: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .sub { color: var(--muted); margin-bottom: 20px; }
    .auth-box {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .auth-box h2 { margin-top: 0; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .value { font-size: 24px; font-weight: 700; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }
    .tab { display: none; }
    .tab.active { display: block; }
    .grid-2 {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 16px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 14px;
      background: white;
    }
    textarea { min-height: 88px; resize: vertical; }
    .btn {
      border: none;
      background: var(--primary);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      width: 100%;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      width: auto;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .smallbox {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: white;
    }
    .hint {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-top: 14px;
      background: white;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.ok { background: var(--ok-bg); color: var(--ok-text); }
    .badge.danger { background: var(--danger-bg); color: var(--danger); }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
      background: white;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      background: #f1f5f9;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .danger-link {
      color: var(--danger);
      cursor: pointer;
      border: none;
      background: none;
      font-weight: 700;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .msg {
      margin-top: 10px;
      font-size: 14px;
      color: var(--danger);
      white-space: pre-wrap;
    }
    .okmsg { color: var(--ok-text); }
    .muted { color: var(--muted); }
    @media (max-width: 900px) {
      .stats, .grid-2, .preview-grid { grid-template-columns: 1fr; }
      .mini-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
