<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테스트</title>
</head>
<body>
  <div id="app">1. HTML 로드 성공</div>

  <script>
    const app = document.getElementById('app');
    app.innerHTML += '<br>2. JS 실행 성공';

    try {
      app.innerHTML += '<br>3. Supabase 스크립트 로드 시작';
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      s.onload = () => {
        app.innerHTML += '<br>4. Supabase 스크립트 로드 성공';
        try {
          const supabase = window.supabase.createClient(
            'https://wjxyspuieuzfhfosmpin.supabase.co',
            'sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j'
          );
          app.innerHTML += '<br>5. Supabase client 생성 성공';
          supabase.auth.getUser().then(({ data, error }) => {
            if (error) {
              app.innerHTML += '<br>6. getUser 에러: ' + error.message;
            } else {
              app.innerHTML += '<br>6. getUser 성공';
              if (data.user) {
                app.innerHTML += '<br>7. 로그인 사용자: ' + data.user.email;
              } else {
                app.innerHTML += '<br>7. 로그인된 사용자 없음';
              }
            }
          }).catch(err => {
            app.innerHTML += '<br>6. 예외: ' + err.message;
          });
        } catch (e) {
          app.innerHTML += '<br>5. client 생성 실패: ' + e.message;
        }
      };
      s.onerror = () => {
        app.innerHTML += '<br>4. Supabase 스크립트 로드 실패';
      };
      document.body.appendChild(s);
    } catch (e) {
      app.innerHTML += '<br>3. 예외: ' + e.message;
    }
  </script>
</body>
</html>
