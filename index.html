<!-- 핵심 부분만 먼저 넣습니다 (로그인 + Supabase 연결) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 로그인 상태 체크
async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    document.body.innerHTML = `
      <h2>로그인</h2>
      <input id="email" placeholder="이메일"><br>
      <input id="password" type="password" placeholder="비밀번호"><br>
      <button onclick="login()">로그인</button>
      <button onclick="signup()">회원가입</button>
    `;
  }
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if (error) alert("로그인 실패");
  else location.reload();
}

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email, password
  });

  if (error) alert("회원가입 실패");
  else alert("가입 완료 후 로그인하세요");
}

checkUser();
</script>
