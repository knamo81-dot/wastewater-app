<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폐수 운영일지 로그인 테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #f8fafc;
      color: #0f172a;
    }
    #app {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border: 1px solid #dbe2ea;
      border-radius: 16px;
      padding: 24px;
    }
    h2 { margin-top: 0; }
    input {
      width: 100%;
      padding: 10px 12px;
      margin: 8px 0 12px;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      cursor: pointer;
      margin-right: 8px;
    }
    .msg {
      margin-top: 12px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
    }
    .err { color: #b91c1c; }
    .ok { color: #166534; }
    .muted { color: #64748b; }
  </style>
</head>
<body>
  <div id="app">로딩중...</div>

  <script>
    const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
    const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";

    const app = document.getElementById("app");
    let supabase = null;

    function setHtml(html) {
      app.innerHTML = html;
    }

    function showStatus(title, lines = [], cls = "muted") {
      setHtml(`
        <h2>${title}</h2>
        <div class="msg ${cls}">${lines.join("<br>")}</div>
      `);
    }

    function showLogin(message = "") {
      setHtml(`
        <h2>로그인</h2>
        <label>이메일</label>
        <input id="email" type="email" placeholder="이메일" />
        <label>비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호" />
        <button onclick="login()">로그인</button>
        <button onclick="signup()">회원가입</button>
        <div class="msg ${message ? "err" : "muted"}">${message || "로그인 또는 회원가입을 진행하세요."}</div>
      `);
    }

    function showApp(user) {
      setHtml(`
        <h2>로그인 성공</h2>
        <div class="msg ok">${user.email}</div>
        <div style="margin-top:16px;">
          <button onclick="logout()">로그아웃</button>
        </div>
      `);
    }

    async function init() {
      try {
        showStatus("초기화 중", [
          "1. HTML 로드 성공",
          "2. Supabase 객체 확인 중..."
        ]);

        if (!window.supabase || !window.supabase.createClient) {
          throw new Error("Supabase CDN 로드 실패");
        }

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        showStatus("초기화 중", [
          "1. HTML 로드 성공",
          "2. Supabase 객체 확인 성공",
          "3. 세션 확인 중..."
        ]);

        const { data, error } = await supabase.auth.getSession();

        if (error) {
          showLogin("세션 확인 오류: " + error.message);
          return;
        }

        if (data && data.session && data.session.user) {
          showApp(data.session.user);
        } else {
          showLogin();
        }
      } catch (err) {
        showStatus("오류 발생", [
          err && err.message ? err.message : String(err)
        ], "err");
      }
    }

    async function login() {
      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showLogin("이메일과 비밀번호를 입력하세요.");
          return;
        }

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          showLogin("로그인 실패: " + error.message);
          return;
        }

        location.reload();
      } catch (err) {
        showLogin("로그인 예외: " + (err.message || String(err)));
      }
    }

    async function signup() {
      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showLogin("이메일과 비밀번호를 입력하세요.");
          return;
        }

        const { error } = await supabase.auth.signUp({
          email,
          password
        });

        if (error) {
          showLogin("회원가입 실패: " + error.message);
          return;
        }

        showLogin("회원가입 완료. 이메일 확인 후 로그인하세요.");
      } catch (err) {
        showLogin("회원가입 예외: " + (err.message || String(err)));
      }
    }

    async function logout() {
      try {
        const { error } = await supabase.auth.signOut();
        if (error) {
          showStatus("로그아웃 오류", [error.message], "err");
          return;
        }
        location.reload();
      } catch (err) {
        showStatus("로그아웃 예외", [err.message || String(err)], "err");
      }
    }

    window.login = login;
    window.signup = signup;
    window.logout = logout;

    init();
  </script>
</body>
</html>
