<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폐수배출시설 운영일지 웹앱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #eef3f8;
      --card: #ffffff;
      --line: #dce5ef;
      --text: #14213d;
      --muted: #6b7a90;
      --navy: #0e1a38;
      --soft: #f7fafc;
      --danger: #ff3b30;
      --danger-soft: #ffe8e5;
      --ok: #0f9d58;
      --ok-soft: #e7f8ef;
      --shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      --radius: 20px;
      --radius-sm: 14px;
      --sky-soft: #eaf4ff;
      --sky-text: #175cd3;
      --amber-soft: #fff4e5;
      --amber-text: #b54708;
      --indigo-soft: #eef2ff;
      --indigo-text: #3538cd;
      --green-soft: #ecfdf3;
      --green-text: #027a48;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea, select { font: inherit; }

    .app-shell {
      max-width: 1540px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .title-wrap .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .status-pill.danger { background: var(--danger); color: #fff; }
    .status-pill.ok { background: var(--ok-soft); color: var(--ok); }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 11px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .btn.soft { background: #fff; }
    .btn.danger { background: #fff; color: #b42318; border-color: #f3b4ad; }
    .btn.block { width: 100%; border-radius: 14px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      padding: 22px;
      min-height: 108px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
    }

    .tab-btn.active {
      background: #fff;
      color: var(--navy);
      box-shadow: var(--shadow);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .main-grid {
      display: grid;
      grid-template-columns: 500px 1fr;
      gap: 18px;
      align-items: start;
    }

    .form-card, .preview-card, .ledger-card, .admin-card, .log-card {
      padding: 24px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--navy);
    }

    .input, .textarea, .select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px 15px;
      color: var(--text);
    }

    .textarea { min-height: 94px; resize: vertical; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 15px;
      background: #fff;
      margin-bottom: 14px;
    }

    .checkbox-row input { width: auto; margin: 0; }

    .actions-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fff;
      min-height: 92px;
    }

    .mini-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .mini-value {
      font-weight: 800;
      font-size: 18px;
    }

    .hint-box {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fbfdff;
      color: #41526b;
      line-height: 1.8;
    }

    .form-chip-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .type-chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 13px 12px;
      text-align: center;
      font-weight: 800;
      cursor: pointer;
      color: var(--muted);
    }

    .type-chip.active.wastewater {
      background: var(--indigo-soft);
      color: var(--indigo-text);
      border-color: #c7d2fe;
    }

    .type-chip.active.waste {
      background: var(--green-soft);
      color: var(--green-text);
      border-color: #b7ebc6;
    }

    .type-box {
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .type-box.wastewater {
      border: 1px solid #dbeafe;
      background: #f5faff;
    }

    .type-box.waste {
      border: 1px solid #d1fadf;
      background: #f3fff7;
    }

    .type-box-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .inline-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .inline-badge.wastewater {
      background: var(--sky-soft);
      color: var(--sky-text);
    }

    .inline-badge.waste {
      background: var(--amber-soft);
      color: var(--amber-text);
    }

    .msg {
      margin-top: 12px;
      white-space: pre-wrap;
      font-size: 14px;
      font-weight: 700;
    }

    .msg.err { color: #b42318; }
    .msg.ok { color: var(--ok); }
    .msg.muted { color: var(--muted); font-weight: 500; }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1080px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f5f8fc;
      color: var(--navy);
      font-weight: 800;
      position: sticky;
      top: 0;
    }

    .small-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 7px 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .small-btn.danger { color: #b42318; border-color: #f5c0bb; }
    .small-btn.primary { color: #0e1a38; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      padding: 28px;
    }

    .login-card h2 {
      margin-top: 0;
      font-size: 28px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #edf3ff;
      color: #2443a7;
      text-transform: uppercase;
    }

    .role-badge.admin { background: #fff1f0; color: #b42318; }
    .role-badge.operator { background: #eef7ff; color: #175cd3; }
    .role-badge.user { background: #f2f4f7; color: #344054; }

    .toolbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .main-grid { grid-template-columns: 1fr; }
      .preview-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .three-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .app-shell { padding: 12px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .title-wrap h1 { font-size: 24px; }
      .stats { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .preview-grid { grid-template-columns: 1fr; }
      .form-card, .preview-card, .ledger-card, .admin-card, .log-card { padding: 18px; }
      .top-actions { justify-content: stretch; }
      .top-actions .btn { width: 100%; }
      table { min-width: 860px; }
      .form-chip-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://wjxyspuieuzfhfosmpin.supabase.co";
const SUPABASE_KEY = "sb_publishable_efMuks4GrwR3WJ8k3ZOK_g_znTfJL1j";
window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAILY_TABLE = 'wastewater';
const PICKUP_TABLE = 'wastewater_pickups';
const USERS_TABLE = 'users';
const LOG_TABLE = 'activity_logs';
const CM_LIMIT = 154;
const TON_TO_CM = 22;
const MAX_TON_M3 = 7;

let user = null;
let currentRole = 'user';
let currentTab = 'daily';
let ledgerMonthFilter = '';
let pickupYearFilter = '';
let pickupTypeFilter = '전체';
let yearlyReportFilter = '';
let dailyRows = [];
let pickupRows = [];
let userRows = [];
let logRows = [];

function escapeHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function round2(v) {
  return Math.round((Number(v || 0) + Number.EPSILON) * 100) / 100;
}

function cmToM3(cm) {
  return round2((Number(cm || 0) / CM_LIMIT) * MAX_TON_M3);
}

function formatNum(v, digits = 2) {
  if (v === null || v === undefined || v === '' || Number.isNaN(Number(v))) return '-';
  return Number(v).toFixed(digits);
}

function roleBadge(role) {
  return `<span class="role-badge ${role}">${role}</span>`;
}

function getTodayGuidelineText(totalCm) {
  return totalCm > CM_LIMIT ? `OVER ${CM_LIMIT}` : `${formatNum(cmToM3(totalCm), 2)} m³`;
}

function canWrite() {
  return currentRole === 'admin' || currentRole === 'operator';
}

function canDelete() {
  return currentRole === 'admin' || currentRole === 'operator';
}

function canAdmin() {
  return currentRole === 'admin';
}

function canDownload() {
  return currentRole === 'admin' || currentRole === 'operator';
}

function monthKeyFromDate(v) {
  return String(v || '').slice(0, 7);
}

function yearKeyFromDate(v) {
  return String(v || '').slice(0, 4);
}

function getDefaultLedgerMonth() {
  const sourceDate = dailyRows.length ? dailyRows[0].date : new Date().toISOString().slice(0, 10);
  return monthKeyFromDate(sourceDate);
}

function getPickupYears() {
  const years = [...new Set(
    pickupRows.map(r => yearKeyFromDate(r.pickup_date)).filter(Boolean)
  )].sort((a, b) => Number(b) - Number(a));

  const currentYear = String(new Date().getFullYear());
  if (!years.includes(currentYear)) years.unshift(currentYear);
  return years;
}

function getDefaultPickupYear() {
  const years = getPickupYears();
  return years[0] || String(new Date().getFullYear());
}

function getAvailableYears() {
  const years = [...new Set([
    ...dailyRows.map(r => yearKeyFromDate(r.date)).filter(Boolean),
    ...pickupRows.map(r => yearKeyFromDate(r.pickup_date)).filter(Boolean)
  ])].sort((a, b) => Number(b) - Number(a));

  const currentYear = String(new Date().getFullYear());
  if (!years.includes(currentYear)) years.unshift(currentYear);
  return years;
}

function getDefaultYearlyReportYear() {
  const years = getAvailableYears();
  return years[0] || String(new Date().getFullYear());
}

function formatMonthLabel(monthKey) {
  if (!monthKey || monthKey.length < 7) return monthKey || '-';
  return `${monthKey.slice(0, 4)}년 ${Number(monthKey.slice(5, 7))}월`;
}

function getMonthRangeText(monthKey) {
  return `${formatMonthLabel(monthKey)} 기준`;
}

function safeNumber(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function summarizeWasteCounts(rows) {
  return rows.reduce((acc, row) => {
    acc.alkali += safeNumber(row.waste_alkali_count);
    acc.acid += safeNumber(row.waste_acid_count);
    acc.organicSolid += safeNumber(row.waste_organic_solid_count);
    acc.organicBottle += safeNumber(row.waste_organic_bottle_count);
    return acc;
  }, {
    alkali: 0,
    acid: 0,
    organicSolid: 0,
    organicBottle: 0
  });
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function init() {
  const { data } = await sb.auth.getSession();
  if (!data.session) return renderLogin();
  user = data.session.user;
  await ensureUserRow(user.email);
  await loadMyRole();
  await loadAll();
}

function renderLogin(message = '', cls = 'muted') {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="card login-card">
        <h2>로그인</h2>
        <div class="field">
          <label>이메일</label>
          <input id="email" class="input" placeholder="이메일" />
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input id="password" class="input" type="password" placeholder="비밀번호" />
        </div>
        <div class="actions-row">
          <button class="btn primary" onclick="login()">로그인</button>
          <button class="btn soft" onclick="signup()">회원가입</button>
        </div>
        <div class="msg ${cls}">${escapeHtml(message || '로그인 또는 회원가입을 진행하세요.')}</div>
      </div>
    </div>
  `;
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return renderLogin(error.message, 'err');
  await ensureUserRow(email);
  await init();
}

async function signup() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.signUp({ email, password });
  if (error) return renderLogin(error.message, 'err');
  await ensureUserRow(email);
  renderLogin('회원가입 완료. 바로 로그인하세요.', 'ok');
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function ensureUserRow(email) {
  const { data } = await sb.from(USERS_TABLE).select('email').eq('email', email).maybeSingle();
  if (!data) {
    await sb.from(USERS_TABLE).insert([{ email, role: 'user' }]);
  }
}

async function loadMyRole() {
  const { data } = await sb.from(USERS_TABLE).select('role').eq('email', user.email).maybeSingle();
  currentRole = data?.role || 'user';
}

async function logActivity(action, targetType, targetId, details) {
  try {
    await sb.from(LOG_TABLE).insert([{
      actor_email: user?.email || 'unknown',
      action,
      target_type: targetType,
      target_id: String(targetId || ''),
      details: JSON.stringify(details || {})
    }]);
  } catch (e) {
    console.warn('activity_logs insert skipped', e);
  }
}

async function loadAll(message = '', cls = 'muted') {
  const [dailyRes, pickupRes, usersRes, logsRes] = await Promise.all([
    sb.from(DAILY_TABLE).select('*').order('date', { ascending: false }).order('created_at', { ascending: false }),
    sb.from(PICKUP_TABLE).select('*').order('pickup_date', { ascending: false }).order('created_at', { ascending: false }),
    canAdmin() ? sb.from(USERS_TABLE).select('*').order('email', { ascending: true }) : Promise.resolve({ data: [] }),
    canAdmin() ? sb.from(LOG_TABLE).select('*').order('created_at', { ascending: false }).limit(200) : Promise.resolve({ data: [] })
  ]);

  dailyRows = dailyRes.data || [];
  pickupRows = pickupRes.data || [];

  if (!ledgerMonthFilter) ledgerMonthFilter = getDefaultLedgerMonth();
  if (!pickupYearFilter) pickupYearFilter = getDefaultPickupYear();
  if (!yearlyReportFilter) yearlyReportFilter = getDefaultYearlyReportYear();

  userRows = usersRes.data || [];
  logRows = logsRes.data || [];
  renderApp(message, cls);
}

function getDerivedStats() {
  const ordered = [...dailyRows].sort((a, b) => new Date(a.date) - new Date(b.date));
  let prevMeter = 0;
  let prevGuideline = 0;
  let totalWaterUse = 0;
  let overCount = 0;
  let latestStatus = '정상';
  let latestStatusClass = 'ok';

  const pickupMap = new Map();
  for (const p of pickupRows) {
    if ((p.pickup_type || '폐수') === '폐수') {
      pickupMap.set(p.pickup_date, p);
    }
  }

  const enriched = ordered.map((row, idx) => {
    const meter = Number(row.usage || 0);
    const waterUsed = idx === 0 ? meter : round2(meter - prevMeter);
    totalWaterUse += Math.max(waterUsed, 0);

    const externalCm = row.has_external
      ? Number(row.external_cm || (Number(row.external_ton || 0) * TON_TO_CM))
      : 0;

    const totalCm = round2(Number(row.height || 0) + externalCm);
    const guidelineText = getTodayGuidelineText(totalCm);
    const guidelineValue = totalCm > CM_LIMIT ? null : cmToM3(totalCm);
    const generated = guidelineValue === null ? null : round2(guidelineValue - prevGuideline);
    const pickup = pickupMap.get(row.date);

    if (totalCm > CM_LIMIT) {
      overCount += 1;
      latestStatus = `OVER ${CM_LIMIT}`;
      latestStatusClass = 'danger';
    } else {
      latestStatus = '정상';
      latestStatusClass = 'ok';
    }

    prevMeter = meter;
    prevGuideline = pickup?.after_pickup_cm != null
      ? cmToM3(Number(pickup.after_pickup_cm))
      : (guidelineValue ?? prevGuideline);

    return {
      ...row,
      water_prev: idx === 0 ? 0 : Number(ordered[idx - 1].usage || 0),
      water_used: waterUsed,
      external_cm: externalCm,
      total_cm: totalCm,
      guideline_text: guidelineText,
      generated_text: generated === null ? 'Unverified' : `${formatNum(generated, 2)} m³`,
      pickup
    };
  });

  const totalEntrusted = pickupRows
    .filter(p => (p.pickup_type || '폐수') === '폐수')
    .reduce((sum, p) => sum + Number(p.entrusted_amount || 0), 0);

  return {
    enrichedDaily: enriched,
    totalWaterUse,
    totalEntrusted,
    overCount,
    latestStatus,
    latestStatusClass,
    latest: enriched.length ? enriched[enriched.length - 1] : null
  };
}

function getPickupTypeBadge(type) {
  const normalized = type || '폐수';
  if (normalized === '폐기물') {
    return `<span class="inline-badge waste">폐기물</span>`;
  }
  return `<span class="inline-badge wastewater">폐수</span>`;
}

function getPickupDetailText(row) {
  const type = row.pickup_type || '폐수';
  if (type === '폐기물') {
    return [
      `폐알칼리 ${Number(row.waste_alkali_count || 0)}`,
      `폐산 ${Number(row.waste_acid_count || 0)}`,
      `고상 ${Number(row.waste_organic_solid_count || 0)}`,
      `폐시약병 ${Number(row.waste_organic_bottle_count || 0)}`
    ].join(' / ');
  }
  return `위탁량 ${formatNum(row.entrusted_amount, 2)}m³ / 수거후높이 ${String(row.after_pickup_cm ?? '-') }cm`;
}

function getMonthlyReportData(monthKey) {
  const stats = getDerivedStats();

  const ledgerRows = [...stats.enrichedDaily]
    .filter(r => monthKeyFromDate(r.date) === monthKey)
    .sort((a, b) => String(a.date).localeCompare(String(b.date)));

  const pickupMonthRows = [...pickupRows]
    .filter(r => monthKeyFromDate(r.pickup_date) === monthKey)
    .sort((a, b) => String(a.pickup_date).localeCompare(String(b.pickup_date)));

  const wastewaterRows = pickupMonthRows.filter(r => (r.pickup_type || '폐수') === '폐수');
  const wasteRows = pickupMonthRows.filter(r => (r.pickup_type || '폐수') === '폐기물');

  const totalWaterUse = round2(ledgerRows.reduce((sum, r) => sum + safeNumber(r.water_used), 0));
  const totalEntrusted = round2(wastewaterRows.reduce((sum, r) => sum + safeNumber(r.entrusted_amount), 0));
  const overRows = ledgerRows.filter(r => safeNumber(r.total_cm) > CM_LIMIT);
  const maxHeight = ledgerRows.length ? Math.max(...ledgerRows.map(r => safeNumber(r.total_cm))) : 0;
  const externalCount = ledgerRows.filter(r => !!r.has_external).length;
  const wasteCounts = summarizeWasteCounts(wasteRows);

  return {
    monthKey,
    monthLabel: formatMonthLabel(monthKey),
    ledgerRows,
    pickupMonthRows,
    wastewaterRows,
    wasteRows,
    totalWaterUse,
    totalEntrusted,
    overRows,
    overCount: overRows.length,
    maxHeight,
    externalCount,
    wasteCounts,
    wastewaterPickupCount: wastewaterRows.length,
    wastePickupCount: wasteRows.length
  };
}

function getYearlyReportData(year) {
  const stats = getDerivedStats();
  const yearLedgerRows = stats.enrichedDaily.filter(r => yearKeyFromDate(r.date) === year);
  const yearPickupRows = pickupRows.filter(r => yearKeyFromDate(r.pickup_date) === year);

  const monthlyMap = {};
  for (let m = 1; m <= 12; m++) {
    const mm = String(m).padStart(2, '0');
    monthlyMap[`${year}-${mm}`] = {
      monthKey: `${year}-${mm}`,
      label: `${m}월`,
      waterUse: 0,
      entrusted: 0,
      overCount: 0,
      wasteAlkali: 0,
      wasteAcid: 0,
      wasteOrganicSolid: 0,
      wasteOrganicBottle: 0
    };
  }

  yearLedgerRows.forEach(row => {
    const mk = monthKeyFromDate(row.date);
    if (!monthlyMap[mk]) return;
    monthlyMap[mk].waterUse += safeNumber(row.water_used);
    if (safeNumber(row.total_cm) > CM_LIMIT) monthlyMap[mk].overCount += 1;
  });

  yearPickupRows.forEach(row => {
    const mk = monthKeyFromDate(row.pickup_date);
    if (!monthlyMap[mk]) return;
    const type = row.pickup_type || '폐수';
    if (type === '폐수') {
      monthlyMap[mk].entrusted += safeNumber(row.entrusted_amount);
    } else {
      monthlyMap[mk].wasteAlkali += safeNumber(row.waste_alkali_count);
      monthlyMap[mk].wasteAcid += safeNumber(row.waste_acid_count);
      monthlyMap[mk].wasteOrganicSolid += safeNumber(row.waste_organic_solid_count);
      monthlyMap[mk].wasteOrganicBottle += safeNumber(row.waste_organic_bottle_count);
    }
  });

  const monthlyRows = Object.values(monthlyMap).map(row => ({
    ...row,
    waterUse: round2(row.waterUse),
    entrusted: round2(row.entrusted)
  }));

  const totalWaterUse = round2(monthlyRows.reduce((sum, r) => sum + safeNumber(r.waterUse), 0));
  const totalEntrusted = round2(monthlyRows.reduce((sum, r) => sum + safeNumber(r.entrusted), 0));
  const totalOverCount = monthlyRows.reduce((sum, r) => sum + safeNumber(r.overCount), 0);

  const wasteTotals = monthlyRows.reduce((acc, row) => {
    acc.alkali += safeNumber(row.wasteAlkali);
    acc.acid += safeNumber(row.wasteAcid);
    acc.organicSolid += safeNumber(row.wasteOrganicSolid);
    acc.organicBottle += safeNumber(row.wasteOrganicBottle);
    return acc;
  }, {
    alkali: 0,
    acid: 0,
    organicSolid: 0,
    organicBottle: 0
  });

  const topOverMonth = [...monthlyRows].sort((a, b) => b.overCount - a.overCount)[0];
  const topWaterMonth = [...monthlyRows].sort((a, b) => b.waterUse - a.waterUse)[0];
  const topEntrustedMonth = [...monthlyRows].sort((a, b) => b.entrusted - a.entrusted)[0];

  return {
    year,
    monthlyRows,
    totalWaterUse,
    totalEntrusted,
    totalOverCount,
    wasteTotals,
    topOverMonth,
    topWaterMonth,
    topEntrustedMonth
  };
}

function makeBarChartSvg({ title, labels, values, unit = '', color = '#2f6fed', height = 220 }) {
  const width = 760;
  const chartLeft = 52;
  const chartRight = 20;
  const chartTop = 30;
  const chartBottom = 42;
  const chartWidth = width - chartLeft - chartRight;
  const chartHeight = height - chartTop - chartBottom;
  const max = Math.max(...values, 1);
  const barWidth = chartWidth / Math.max(values.length, 1) * 0.55;
  const gap = chartWidth / Math.max(values.length, 1);

  const bars = values.map((v, i) => {
    const barHeight = max === 0 ? 0 : (v / max) * chartHeight;
    const x = chartLeft + (i * gap) + (gap - barWidth) / 2;
    const y = chartTop + (chartHeight - barHeight);
    const labelX = x + barWidth / 2;
    const valueY = y - 6;

    return `
      <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="6" fill="${color}"></rect>
      <text x="${labelX}" y="${valueY}" text-anchor="middle" font-size="11" fill="#344054">${v}</text>
      <text x="${labelX}" y="${height - 16}" text-anchor="middle" font-size="11" fill="#667085">${labels[i]}</text>
    `;
  }).join('');

  const grid = [0.25, 0.5, 0.75, 1].map(ratio => {
    const y = chartTop + chartHeight - (chartHeight * ratio);
    const label = Math.round(max * ratio * 100) / 100;
    return `
      <line x1="${chartLeft}" y1="${y}" x2="${width - chartRight}" y2="${y}" stroke="#e4e7ec" stroke-width="1"></line>
      <text x="${chartLeft - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="#98a2b3">${label}</text>
    `;
  }).join('');

  return `
    <div style="margin-bottom:18px;">
      <div style="font-size:14px;font-weight:800;margin-bottom:8px;color:#101828;">${escapeHtml(title)} ${unit ? `<span style="font-size:12px;color:#667085;">(${escapeHtml(unit)})</span>` : ''}</div>
      <svg width="100%" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
        ${grid}
        <line x1="${chartLeft}" y1="${chartTop + chartHeight}" x2="${width - chartRight}" y2="${chartTop + chartHeight}" stroke="#98a2b3" stroke-width="1"></line>
        ${bars}
      </svg>
    </div>
  `;
}
  function makeStackedBarChartSvg({
  title,
  labels,
  series,
  colors,
  unit = '',
  height = 260
}) {
  const width = 760;
  const chartLeft = 52;
  const chartRight = 20;
  const chartTop = 30;
  const chartBottom = 42;
  const chartWidth = width - chartLeft - chartRight;
  const chartHeight = height - chartTop - chartBottom;

  const totals = labels.map((_, idx) =>
    series.reduce((sum, s) => sum + safeNumber(s.values[idx]), 0)
  );
  const max = Math.max(...totals, 1);

  const barWidth = chartWidth / Math.max(labels.length, 1) * 0.55;
  const gap = chartWidth / Math.max(labels.length, 1);

  let bars = '';

  labels.forEach((label, i) => {
    const x = chartLeft + (i * gap) + (gap - barWidth) / 2;
    let currentTop = chartTop + chartHeight;

    series.forEach((s, sIdx) => {
      const value = safeNumber(s.values[i]);
      const segHeight = max === 0 ? 0 : (value / max) * chartHeight;
      const y = currentTop - segHeight;

      if (segHeight > 0) {
        bars += `
          <rect x="${x}" y="${y}" width="${barWidth}" height="${segHeight}" rx="2" fill="${colors[sIdx]}"></rect>
        `;
      }

      currentTop = y;
    });

    bars += `
      <text x="${x + barWidth / 2}" y="${chartTop + chartHeight - ((totals[i] / max) * chartHeight) - 6}" text-anchor="middle" font-size="11" fill="#344054">${totals[i]}</text>
      <text x="${x + barWidth / 2}" y="${height - 16}" text-anchor="middle" font-size="11" fill="#667085">${label}</text>
    `;
  });

  const grid = [0.25, 0.5, 0.75, 1].map(ratio => {
    const y = chartTop + chartHeight - (chartHeight * ratio);
    const label = Math.round(max * ratio * 100) / 100;
    return `
      <line x1="${chartLeft}" y1="${y}" x2="${width - chartRight}" y2="${y}" stroke="#e4e7ec" stroke-width="1"></line>
      <text x="${chartLeft - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="#98a2b3">${label}</text>
    `;
  }).join('');

const legend = series.map((s, idx) => `
  <div style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#475467;margin-right:14px;">
    <svg width="10" height="10" viewBox="0 0 10 10" style="display:block;">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="${colors[idx]}" stroke="${colors[idx]}"></rect>
    </svg>

`).join('');

  return `
    <div style="margin-bottom:18px;">
      <div style="font-size:14px;font-weight:800;margin-bottom:8px;color:#101828;">${escapeHtml(title)} ${unit ? `<span style="font-size:12px;color:#667085;">(${escapeHtml(unit)})</span>` : ''}</div>

}

function updateDailyPreview() {
  const hasExternal = !!document.getElementById('daily-has-external')?.checked;
  toggleExternalBox();

  const latestMeter = (() => {
    const stats = getDerivedStats();
    return stats.latest ? Number(stats.latest.usage || 0) : 0;
  })();

  const meter = Number(document.getElementById('daily-usage')?.value || 0);
  const height = Number(document.getElementById('daily-height')?.value || 0);
  const extTon = Number(document.getElementById('daily-external-ton')?.value || 0);
  const extCm = hasExternal ? Number(document.getElementById('daily-external-cm')?.value || (extTon * TON_TO_CM)) : 0;
  const totalCm = round2(height + extCm);
  const waterUsed = meter ? round2(meter - latestMeter) : null;
  const guideline = meter || height ? getTodayGuidelineText(totalCm) : '-';
  const latest = getDerivedStats().latest;
  const prevGuideline = latest?.pickup?.after_pickup_cm != null
    ? cmToM3(Number(latest.pickup.after_pickup_cm))
    : (latest ? (latest.total_cm > CM_LIMIT ? 0 : cmToM3(latest.total_cm)) : 0);

  const generated = (meter || height)
    ? (totalCm > CM_LIMIT ? 'Unverified' : `${formatNum(round2(cmToM3(totalCm) - prevGuideline), 2)} m³`)
    : '-';

  setText('pv-water-prev', `${formatNum(latestMeter, 2)} m³`);
  setText('pv-water-today', meter ? `${formatNum(meter, 2)} m³` : '-');
  setText('pv-water-used', waterUsed === null ? '-' : `${formatNum(waterUsed, 2)} m³`);
  setText('pv-external-cm', `${formatNum(extCm, 1)} cm`);
  setText('pv-total-cm', totalCm ? `${formatNum(totalCm, 1)} cm` : '-');
  setText('pv-guideline', `${guideline} / ${generated}`);
}

async function saveDailyRow() {
  if (!canWrite()) return renderApp('저장 권한이 없습니다.', 'err');

  const date = document.getElementById('daily-date').value;
  const usage = document.getElementById('daily-usage').value;
  const height = document.getElementById('daily-height').value;
  const note = document.getElementById('daily-note').value;
  const hasExternal = document.getElementById('daily-has-external').checked;
  const externalTon = document.getElementById('daily-external-ton').value || 0;
  const externalCm = document.getElementById('daily-external-cm').value || 0;

  if (!date || usage === '' || height === '') return renderApp('날짜, 용수, 높이는 필수입니다.', 'err');

  const { data, error } = await sb.from(DAILY_TABLE).insert([{
    date,
    usage: parseFloat(usage),
    height: parseFloat(height),
    note,
    has_external: hasExternal,
    external_ton: parseFloat(externalTon || 0),
    external_cm: parseFloat(externalCm || 0)
  }]).select().single();

  if (error) return renderApp('일일 입력 저장 실패: ' + error.message, 'err');

  await logActivity('save', 'daily', data?.id, { date, usage, height });
  clearDailyForm();
  await loadAll('일일 입력 저장 완료', 'ok');
}

function clearDailyForm() {
  ['daily-date','daily-usage','daily-height','daily-note','daily-external-ton','daily-external-cm'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id === 'daily-external-ton') el.value = '1';
    else if (id === 'daily-external-cm') el.value = '22';
    else el.value = '';
  });

  const chk = document.getElementById('daily-has-external');
  if (chk) chk.checked = false;
  toggleExternalBox();
  updateDailyPreview();
}

async function savePickupRow() {
  if (!canWrite()) return renderApp('저장 권한이 없습니다.', 'err');

  const pickupType = document.getElementById('pickup-type')?.value || '폐수';
  const pickupDate = document.getElementById('pickup-date').value;
  const certificateNo = document.getElementById('pickup-cert').value;
  const contractor = document.getElementById('pickup-contractor').value;
  const note = document.getElementById('pickup-note').value;

  if (!pickupDate) return renderApp('수거일은 필수입니다.', 'err');

  const payload = {
    pickup_date: pickupDate,
    pickup_type: pickupType,
    certificate_no: certificateNo,
    contractor,
    note
  };

  if (pickupType === '폐수') {
    const entrustedAmount = document.getElementById('pickup-amount').value;
    const afterPickupCmRaw = document.getElementById('pickup-after-cm').value.trim();

    if (entrustedAmount === '') return renderApp('폐수는 위탁량이 필수입니다.', 'err');

    payload.entrusted_amount = parseFloat(entrustedAmount);

    if (afterPickupCmRaw === '') {
      payload.after_pickup_cm = null;
    } else {
      const normalized = afterPickupCmRaw.toLowerCase().replace(/\s+/g, '');
      if (normalized.startsWith('over')) {
        payload.after_pickup_cm = CM_LIMIT;
      } else {
        const parsed = Number(afterPickupCmRaw);
        if (Number.isNaN(parsed)) {
          return renderApp('수거 후 높이는 숫자 또는 over 154 형식으로 입력하세요.', 'err');
        }
        payload.after_pickup_cm = parsed;
      }
    }

    payload.waste_alkali_count = 0;
    payload.waste_acid_count = 0;
    payload.waste_organic_solid_count = 0;
    payload.waste_organic_bottle_count = 0;
  } else {
    payload.entrusted_amount = null;
    payload.after_pickup_cm = null;
    payload.waste_alkali_count = parseInt(document.getElementById('waste-alkali-count').value || 0, 10);
    payload.waste_acid_count = parseInt(document.getElementById('waste-acid-count').value || 0, 10);
    payload.waste_organic_solid_count = parseInt(document.getElementById('waste-organic-solid-count').value || 0, 10);
    payload.waste_organic_bottle_count = parseInt(document.getElementById('waste-organic-bottle-count').value || 0, 10);
  }

  const { data, error } = await sb.from(PICKUP_TABLE).insert([payload]).select().single();

  if (error) return renderApp('수거 등록 저장 실패: ' + error.message, 'err');

  await logActivity('save', 'pickup', data?.id, payload);
  clearPickupForm();
  await loadAll('수거 등록 저장 완료', 'ok');
}

function clearPickupForm() {
  const resetIds = [
    'pickup-date',
    'pickup-cert',
    'pickup-contractor',
    'pickup-amount',
    'pickup-after-cm',
    'pickup-note',
    'waste-alkali-count',
    'waste-acid-count',
    'waste-organic-solid-count',
    'waste-organic-bottle-count'
  ];

  resetIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (
      id === 'waste-alkali-count' ||
      id === 'waste-acid-count' ||
      id === 'waste-organic-solid-count' ||
      id === 'waste-organic-bottle-count'
    ) {
      el.value = '0';
    } else {
      el.value = '';
    }
  });

  const typeEl = document.getElementById('pickup-type');
  if (typeEl) typeEl.value = '폐수';
  togglePickupType();
}

async function transferAdmin(targetEmail) {
  if (!canAdmin()) return renderApp('관리자만 양도 가능합니다.', 'err');
  if (!confirm(`${targetEmail} 에게 관리자 권한을 양도하시겠습니까?`)) return;

  const demote = await sb.from(USERS_TABLE).update({ role: 'operator' }).eq('email', user.email);
  if (demote.error) return renderApp('현재 관리자 권한 변경 실패: ' + demote.error.message, 'err');

  const promote = await sb.from(USERS_TABLE).update({ role: 'admin' }).eq('email', targetEmail);
  if (promote.error) return renderApp('관리자 양도 실패: ' + promote.error.message, 'err');

  await logActivity('transfer_admin', 'user', targetEmail, { from: user.email, to: targetEmail });
  await loadMyRole();
  await loadAll('관리자 양도 완료', 'ok');
}

function openReportPrintWindow(html) {
  const win = window.open('', '_blank');
  if (!win) {
    return renderApp('팝업이 차단되어 보고서를 열 수 없습니다.', 'err');
  }

  win.document.open();
  win.document.write(html);
  win.document.close();

  setTimeout(() => {
    win.focus();
    win.print();
  }, 500);
}

function downloadMonthlyReportPdf() {
  if (!canDownload()) {
    return renderApp('월보고서 출력 권한이 없습니다.', 'err');
  }

  const month = document.getElementById('ledger-month')?.value || ledgerMonthFilter;
  if (!month) {
    return renderApp('월보고서 기준 월이 없습니다.', 'err');
  }

  const html = buildMonthlyReportHtml(month);
  openReportPrintWindow(html);
}

function downloadYearlyReportPdf() {
  if (!canDownload()) {
    return renderApp('연보고서 출력 권한이 없습니다.', 'err');
  }

  const year = yearlyReportFilter || getDefaultYearlyReportYear();
  if (!year) {
    return renderApp('연보고서 기준 연도가 없습니다.', 'err');
  }

  const html = buildYearlyReportHtml(year);
  openReportPrintWindow(html);
}

function downloadMonthlyExcel() {
  if (!canDownload()) {
    return renderApp('엑셀 다운로드 권한이 없습니다.', 'err');
  }

  const month = document.getElementById('ledger-month')?.value || ledgerMonthFilter || monthKeyFromDate(new Date().toISOString().slice(0, 10));
  const stats = getDerivedStats();

  const ledgerRows = [...stats.enrichedDaily]
    .filter(r => monthKeyFromDate(r.date) === month)
    .sort((a, b) => String(b.date).localeCompare(String(a.date)) || String(b.created_at || '').localeCompare(String(a.created_at || '')));

  const pickupFiltered = pickupRows
    .filter(r => monthKeyFromDate(r.pickup_date) === month)
    .sort((a, b) => String(b.pickup_date).localeCompare(String(a.pickup_date)) || String(b.created_at || '').localeCompare(String(a.created_at || '')));

  const logsFiltered = logRows.filter(r => monthKeyFromDate(r.created_at) === month);

  const sheet1 = [
    ['날짜','용수전일','용수금일','당일사용량','저장고높이','외부보관','계산용총높이','금일지침','총발생량','수거정보','기타'],
    ...ledgerRows.map(r => [
      r.date,
      formatNum(r.water_prev,2),
      formatNum(r.usage,2),
      formatNum(r.water_used,2),
      formatNum(r.height,1),
      r.has_external ? `${formatNum(r.external_ton || 0,1)}T / ${formatNum(r.external_cm,1)}cm` : '-',
      formatNum(r.total_cm,1),
      r.guideline_text,
      r.generated_text,
      r.pickup ? `위탁 ${formatNum(r.pickup.entrusted_amount,2)} / 후높이 ${String(r.pickup.after_pickup_cm ?? '-')}` : '-',
      r.note || ''
    ])
  ];

  const sheet2 = [
    ['수거일','구분','세부내용','확인서번호','처리업소','비고'],
    ...pickupFiltered.map(r => [
      r.pickup_date,
      r.pickup_type || '폐수',
      getPickupDetailText(r),
      r.certificate_no || '',
      r.contractor || '',
      r.note || ''
    ])
  ];

  const sheet3 = [
    ['시간','사용자','동작','대상','상세'],
    ...logsFiltered.map(r => [r.created_at || '', r.actor_email || '', r.action || '', `${r.target_type || ''}/${r.target_id || ''}`, r.details || ''])
  ];

  const workbookHtml = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:x="urn:schemas-microsoft-com:office:excel"
          xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="UTF-8">
        <!--[if gte mso 9]><xml>
          <x:ExcelWorkbook>
            <x:ExcelWorksheets>
              <x:ExcelWorksheet><x:Name>운영일지</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
              <x:ExcelWorksheet><x:Name>수거등록</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
              <x:ExcelWorksheet><x:Name>로그</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
            </x:ExcelWorksheets>
          </x:ExcelWorkbook>
        </xml><![endif]-->
      </head>
      <body>
        ${tableToHtml('운영일지', sheet1)}
        <br/><br/>
        ${tableToHtml('수거등록', sheet2)}
        <br/><br/>
        ${tableToHtml('로그', sheet3)}
      </body>
    </html>
  `;

  downloadFile(`폐수운영일지_${month}.xls`, workbookHtml, 'application/vnd.ms-excel;charset=utf-8;');
}

function tableToHtml(title, rows) {
  return `
    <table border="1">
      <tr><th colspan="${rows[0]?.length || 1}" style="background:#dbe5f1;">${escapeHtml(title)}</th></tr>
      ${rows.map((row, idx) => `
        <tr>
          ${row.map(cell => idx === 0
            ? `<th>${escapeHtml(cell)}</th>`
            : `<td>${escapeHtml(cell)}</td>`).join('')}
        </tr>
      `).join('')}
    </table>
  `;
}
